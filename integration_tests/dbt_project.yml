name: 'integration_tests'
version: '1.0.0'
config-version: 2

profile: default

vars:
  ## Broad enablement vars
  claims_enabled: true
  clinical_enabled: true
  provider_attribution_enabled: true
  semantic_layer_enabled: true
  enable_data_quality: true
  enable_legacy_data_quality: false
  # Use selectors to run specific marts.
  # fhir_preprocessing_enabled: true # defaults to false

  ## Synthetic data bootstrap configuration
  use_synthetic_data: true
  synthetic_data_size: small
  custom_bucket_name: tuva-public-resources
  tuva_seed_version: "1.0.0"
  tuva_seed_versions:
    concept_library: "1.0.1"
    reference_data: "1.1.0"
    terminology: "1.1.1"
    value_sets: "1.1.0"
    provider_data: "1.1.0"
    synthetic_data: "1.1.0"
  tuva_seed_buckets: {}

  ## Passthrough Columns Configuration
  # Allows custom columns with a prefix to flow through Tuva models to core outputs.
  # passthrough:
  #   prefix: 'x_'    # Prefix to identify passthrough columns (default: 'x_')
  #   strip: false    # Whether to strip prefix in final output (default: false)

  ## CMS HCC data mart vars
  # The payment_year variable has a default of the current year.
  # To override it, set a numeric value such as cms_hcc_payment_year: 2019.
  # cms_hcc_payment_year: 2018

  ## Quality Measures period var
  # To run quality measures for a period other than current year, uncomment below.
  # quality_measures_period_end: "2018-12-31"


model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
clean-targets:
  - "target"
  - "dbt_packages"


dispatch:
  - macro_namespace: 'the_tuva_project'
    search_order: ['integration_tests', 'the_tuva_project']
  - macro_namespace: 'dbt_utils'
    search_order: ['integration_tests', 'the_tuva_project', 'dbt_utils']


models:
  integration_tests:
    +materialized: ephemeral
flags:
  require_generic_test_arguments_property: true
  require_ref_searches_node_package_before_root: true
