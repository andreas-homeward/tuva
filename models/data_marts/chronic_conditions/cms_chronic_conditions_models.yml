  - name: chronic_conditions__cms_chronic_conditions_long
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_chronic_conditions
        {% else %}chronic_conditions{%- endif -%}
      alias: cms_chronic_conditions_long
      tags:
        - cms_chronic_conditions
        - chronic_conditions
      materialized: table
    description: >
      This model unions condition flags from the 3 upstream stage models that
      calculate them.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - person_id
              - claim_id
              - data_source
              - start_date
              - condition
      - the_tuva_project.expect_table_row_count_to_be_between:
          # description: This is a check in one of the final downstream marts to see if chronic_conditions__cms_chronic_conditions_long is populated. If this is flagging, please check other areas further upstream on the input layer.
          config:
            severity: warn
            enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
            meta:
              dqi_test_description: "This is a check in one of the final downstream marts to
                see if chronic_conditions__cms_chronic_conditions_long is
                populated. If this is flagging, please check other areas further
                upstream on the input layer."
            tags: [ 'tuva_dqi_sev_3', 'dqi', 'dqi_cms_chronic_conditions', 'dqi_usability' ]
          arguments:
            min_value: 1
            strictly: false
    columns:
      - name: person_id
        description: Unique ID for the patient.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: claim_id
        description: Unique identifier for each claim.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: start_date
        description: >
          Start date of the chronic condition derived from diagnosis, procedure,
          or medication.
        config:
          meta:
            data_type: date
            is_primary_key: true
      - name: chronic_condition_type
        description: >
          The type of chronic condition as defined by CMS. ('Common' or 'Other
          chronic or potentially disabling conditions')
        config:
          meta:
            terminology: https://thetuvaproject.com/value-sets/chronic-conditions#cms_chronic_conditions_hierarchy
            data_type: integer
      - name: condition_category
        description: >
          The category of the condition (e.g. Cardiovascular Disease).
        config:
          meta:
            terminology: https://thetuvaproject.com/value-sets/chronic-conditions#cms_chronic_conditions_hierarchy
            data_type: integer
      - name: condition
        description: The name of the chronic condition.
        tests:
          - not_null
        config:
          meta:
            terminology: https://thetuvaproject.com/value-sets/chronic-conditions#cms_chronic_conditions_hierarchy
            data_type: integer
            is_primary_key: true
      - name: data_source
        description: >
          Indicates the name of the source dataset (e.g. Medicare Claims).
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: tuva_last_run
        description: The time at which the model was materialized. Generated by
          `dbt_utils.pretty_time` as the local time of the `dbt run`
          environment. Timezone is configurable via the `tuva_last_run` var.
        config:
          meta:
            data_type: timestamp

  ## Intermediate
  - name: chronic_conditions__cms_chronic_conditions_all
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_chronic_conditions
        {% else %}chronic_conditions{%- endif -%}
      alias: _int_cms_chronic_condition_all
      tags:
        - cms_chronic_conditions
        - chronic_conditions
      materialized: table
    description: >
      This model contains logic for all chronic conditions where
      additional_logic is not 'None'. This model includes standard exclusions
      and maps ICD-10-CM diagnosis codes, ICD-10-PCS procedure codes, HCPCS
      codes, and MS DRG codes to chronic conditions.
    columns:
      - name: person_id
        description: Unique ID for the patient.
        tests:
          - not_null
      - name: claim_id
        description: Unique identifier for each claim.
        tests:
          - not_null
      - name: start_date
        description: >
          Start date of the chronic condition derived from diagnosis, procedure,
          or medication.
      - name: chronic_condition_type
        description: >
          The type of chronic condition as defined by CMS. ('Common' or 'Other
          chronic or potentially disabling conditions')
      - name: condition_category
        description: >
          The category of the condition (e.g. Cardiovascular Disease).
      - name: condition
        description: The name of the chronic condition.
        tests:
          - not_null
      - name: data_source
        description: >
          Indicates the name of the source dataset (e.g. Medicare Claims).

  - name: chronic_conditions__cms_chronic_conditions_hiv_aids
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_chronic_conditions
        {% else %}chronic_conditions{%- endif -%}
      alias: _int_cms_chronic_condition_hiv_aids
      tags:
        - cms_chronic_conditions
        - chronic_conditions
      materialized: table
    description: >
      This model contains logic for the chronic condition Human Immunodeficiency
      Virus and/or Acquired Immunodeficiency Syndrome (HIV/AIDS). This model
      maps ICD-10-CM diagnosis codes and MS DRG codes to the chronic condition.
    columns:
      - name: person_id
        description: Unique ID for the patient.
        tests:
          - not_null
      - name: claim_id
        description: Unique identifier for each claim.
        tests:
          - not_null
      - name: start_date
        description: >
          Start date of the chronic condition derived from diagnosis, procedure,
          or medication.
      - name: chronic_condition_type
        description: >
          The type of chronic condition as defined by CMS. ('Common' or 'Other
          chronic or potentially disabling conditions')
      - name: condition_category
        description: The category of the condition (e.g. Other).
      - name: condition
        description: The name of the chronic condition.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  [
                    'Human Immunodeficiency Virus and/or Acquired
                      Immunodeficiency Syndrome (HIV/AIDS)'
                  ]
      - name: data_source
        description: >
          Indicates the name of the source dataset (e.g. Medicare Claims).

  - name: chronic_conditions__cms_chronic_conditions_oud
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_chronic_conditions
        {% else %}chronic_conditions{%- endif -%}
      alias: _int_cms_chronic_condition_oud
      tags:
        - cms_chronic_conditions
        - chronic_conditions
      materialized: table
    description: >
      This model contains logic for the chronic condition Opioid Use
      Disorder  (OUD). This model maps ICD-10-CM diagnosis codes, ICD-10-PCS
      procedure codes, HCPCS codes, and NDC codes to the chronic condition.
    columns:
      - name: person_id
        description: Unique ID for the patient.
        tests:
          - not_null
      - name: claim_id
        description: Unique identifier for each claim.
        tests:
          - not_null
      - name: start_date
        description: >
          Start date of the chronic condition derived from diagnosis, procedure,
          or medication.
      - name: chronic_condition_type
        description: >
          The type of chronic condition as defined by CMS. ('Common' or 'Other
          chronic or potentially disabling conditions')
      - name: condition_category
        description: The category of the condition (e.g. Substance Abuse).
      - name: condition
        description: The name of the chronic condition.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [ 'Opioid Use Disorder (OUD)' ]
      - name: data_source
        description: >
          Indicates the name of the source dataset (e.g. Medicare Claims).

