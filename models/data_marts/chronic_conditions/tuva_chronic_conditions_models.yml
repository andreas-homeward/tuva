version: 2

models:

  ## Final
  - name: chronic_conditions__tuva_chronic_conditions_long
    description: >
      This model creates one record per patient per condition using the tuva
      chronic conditions hierarchy as the grouper. The model pulls in the first
      and last date of the diagnosis that flagged the patient for this condition
      group.
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_chronic_conditions
        {% else %}chronic_conditions{%- endif -%}
      alias: tuva_chronic_conditions_long
      tags:
        - tuva_chronic_conditions
        - chronic_conditions
      materialized: table
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - person_id
              - condition
      - the_tuva_project.expect_table_row_count_to_be_between:
          description: This is a check in one of the final downstream marts to see if
            chronic_conditions__tuva_chronic_conditions_long is populated. If
            this is flagging, please check other areas further upstream on the
            input layer.
          config:
            severity: warn
            enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
            meta:
              dqi_test_description: "This is a check in one of the final downstream marts to
                see if chronic_conditions__tuva_chronic_conditions_long is
                populated. If this is flagging, please check other areas further
                upstream on the input layer."
            tags: [ 'tuva_dqi_sev_3', 'dqi', 'dqi_tuva_chronic_conditions', 'dqi_usability' ]
          arguments:
            min_value: 1
            strictly: false
    columns:
      - name: person_id
        description: The unique identifier for a patient
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: condition
        description: >
          The name of the condition that each diagnosis code rolls up to
        config:
          meta:
            terminology: https://thetuvaproject.com/value-sets/chronic-conditions#tuva_chronic_conditions_hierarchy
            data_type: integer
            is_primary_key: true
      - name: first_diagnosis_date
        description: >
          The first date when a diagnosis code that rolls up to this condition
          was coded to this patient
        config:
          meta:
            data_type: date
      - name: last_diagnosis_date
        description: >
          The last date when a diagnosis code that rolls up to this condition
          was coded to this patient
        config:
          meta:
            data_type: date
      - name: tuva_last_run
        description: >
          The time at which the model was materialized. Generated by
          `dbt_utils.pretty_time` as the local time of the `dbt run`
          environment. Timezone is configurable via the `tuva_last_run` var.
        config:
          meta:
            data_type: timestamp

  - name: chronic_conditions__tuva_chronic_conditions_wide
