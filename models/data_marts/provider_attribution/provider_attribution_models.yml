version: 2

models:
  - name: provider_attribution__assigned_beneficiaries_yearly
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_provider_attribution{% else %}provider_attribution{%- endif -%}
      alias: assigned_beneficiaries_yearly
      materialized: table
      tags: [ "tuva_provider_attribution" ]
    columns:
      - name: person_id
        description: Unique identifier for the person assigned to a provider.
        config:
          meta:
            data_type: varchar
      - name: performance_year
        description: Calendar year used to calculate the yearly attribution assignment.
        config:
          meta:
            data_type: integer
      - name: provider_id
        description: Identifier for the assigned provider.
        config:
          meta:
            data_type: varchar
      - name: provider_bucket
        description: Provider classification bucket used by the attribution logic.
        config:
          meta:
            data_type: varchar
      - name: prov_specialty
        description: Provider specialty used by the attribution logic.
        config:
          meta:
            data_type: varchar
      - name: assigned_step
        description: Attribution step that produced the final provider assignment.
        config:
          meta:
            data_type: integer
      - name: step_description
        description: Description of the attribution step that produced the final
          provider assignment.
        config:
          meta:
            data_type: varchar
      - name: allowed_amount
        description: Allowed amount used by the attribution logic to rank providers.
        config:
          meta:
            data_type: number
      - name: visits
        description: Count of qualifying visits used by the attribution logic to rank
          providers.
        config:
          meta:
            data_type: integer
      - name: lookback_start_date
        description: First date in the lookback window used for the attribution assignment.
        config:
          meta:
            data_type: date
      - name: lookback_end_date
        description: Last date in the lookback window used for the attribution assignment.
        config:
          meta:
            data_type: date
      - name: attribution_key
        description: Synthetic key for the yearly attribution assignment record.
        tests:
          - not_null
          - unique
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: tuva_last_run
        description: Timestamp for when the model was last run.
        config:
          meta:
            data_type: timestamp

