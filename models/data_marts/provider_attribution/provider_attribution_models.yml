  - name: provider_attribution__provider_ranking
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_provider_attribution{% else %}provider_attribution{%- endif -%}
      alias: provider_ranking
      materialized: table
      tags: [ "tuva_provider_attribution" ]
    columns:
      - name: person_id
        description: Unique identifier for the person included in provider attribution
          ranking.
        config:
          meta:
            data_type: varchar
      - name: performance_year
        description: Calendar year for yearly attribution rows. Null for current
          attribution rows.
        config:
          meta:
            data_type: integer
      - name: as_of_date
        description: Anchor date for current attribution rows. Null for yearly
          attribution rows.
        config:
          meta:
            data_type: date
      - name: provider_id
        description: Identifier for the ranked provider.
        tests: [not_null]
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: provider_bucket
        description: Provider classification bucket used by the attribution logic.
        config:
          meta:
            data_type: varchar
      - name: prov_specialty
        description: Provider specialty used by the attribution logic.
        config:
          meta:
            data_type: varchar
      - name: step
        description: Attribution step that qualified the provider for ranking.
        config:
          meta:
            data_type: integer
      - name: step_description
        description: Description of the attribution step that qualified the provider for
          ranking.
        config:
          meta:
            data_type: varchar
      - name: allowed_amount
        description: Allowed amount used by the attribution logic to rank the provider.
        config:
          meta:
            data_type: number
      - name: visits
        description: Count of qualifying visits used by the attribution logic to rank
          the provider.
        config:
          meta:
            data_type: integer
      - name: scope
        description: Attribution scope for the ranked row, either current or yearly.
        config:
          meta:
            data_type: varchar
      - name: lookback_start_date
        description: First date in the lookback window used for the attribution ranking.
        config:
          meta:
            data_type: date
      - name: lookback_end_date
        description: Last date in the lookback window used for the attribution ranking.
        config:
          meta:
            data_type: date
      - name: ranking
        description: Provider rank within the attribution scope and person.
        config:
          meta:
            data_type: integer
      - name: attribution_key
        description: Synthetic key for the attribution scope and person.
        tests: [not_null]
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: tuva_last_run
        description: Timestamp for when the model was last run.
        config:
          meta:
            data_type: timestamp
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [ attribution_key, provider_id ]

