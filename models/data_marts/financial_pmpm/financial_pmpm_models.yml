        description: Identifier that links the person to a particular insurance product
          or health plan for the member month.
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: year_month
        description: Year and month for the member-month or aggregation period.
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: payer
        description: Name of the payer associated with the record.
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: plan
        description: Name of the health plan associated with the record.
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: data_source
        description: Source dataset associated with the record.
        config:
          meta:
            data_type: varchar
