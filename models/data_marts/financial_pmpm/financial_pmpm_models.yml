        - financial_pmpm
      materialized: table
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - person_id
              - member_id
              - year_month
              - payer
              - data_source
              - "{{ quote_column('plan') }}"
    description: >
      Computes all the paid and allowed statistics for every person_id and
      year_month combination.
