  - name: int_eligibility_state_normalized
    description: |-
      This model normalizes the source state value from int_eligibility_casting by left joining to reference_data__ansi_fips_state. The join matches when trim(lower(state)) equals trim(lower(ansi_fips_state_abbreviation)), trim(lower(ansi_fips_state_code)), or trim(lower(ansi_fips_state_name)).

      The model returns the matched ANSI/FIPS state name, state code, and state abbreviation. If the source state value does not match the reference table, normalized_state_name, fips_state_code, and fips_state_abbreviation are null.
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_claims_preprocessing
        {%- else -%}claims_preprocessing{%- endif -%}
      alias: int_eligibility_state_normalized
      meta:
        dag:
          node_type: intermediate
      materialized: table
      tags:
        - normalized_input
        - claims_preprocessing
    columns:
      - name: person_id
        description: Unique identifier for each person in the dataset from int_eligibility_casting.
      - name: person_id_key
        description: Synthetic join key from int_eligibility_casting. It is built from person_id, member_id, data_source, payer, plan, enrollment_start_date, and enrollment_end_date and is used to join normalized state values back to the eligibility record.
      - name: normalized_state_name
        description: ANSI/FIPS state name from reference_data__ansi_fips_state. Null when the source state value does not match state abbreviation, state code, or state name in the reference table.
      - name: fips_state_code
        description: ANSI/FIPS state code from reference_data__ansi_fips_state. Null when the source state value does not match state abbreviation, state code, or state name in the reference table.
      - name: fips_state_abbreviation
        description: ANSI/FIPS state abbreviation from reference_data__ansi_fips_state. Null when the source state value does not match state abbreviation, state code, or state name in the reference table.
