  - name: int_eligibility_dates_normalized
    description: |-
      This model normalizes the eligibility date fields by joining int_eligibility_casting to reference_data__calendar once for each source date field: birth_date, death_date, enrollment_start_date, and enrollment_end_date. Each normalized_* date column is populated from reference_data__calendar.full_date. If a source date is null or does not match a row in reference_data__calendar, the corresponding normalized_* date column is null.

      The model keeps one distinct row per person_id and person_id_key.
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_claims_preprocessing
        {%- else -%}claims_preprocessing{%- endif -%}
      alias: int_eligibility_dates_normalized
      meta:
        dag:
          node_type: intermediate
      materialized: table
      tags:
        - normalized_input
        - claims_preprocessing
    columns:
      - name: person_id
        description: Unique identifier for each person in the dataset from int_eligibility_casting.
      - name: person_id_key
        description: Synthetic join key from int_eligibility_casting. It is built from person_id, member_id, data_source, payer, plan, enrollment_start_date, and enrollment_end_date and is used to join normalized date values back to the eligibility record.
      - name: normalized_birth_date
        description: Birth date matched to reference_data__calendar.full_date. Null when the source birth_date is null or does not match the calendar.
      - name: normalized_death_date
        description: Death date matched to reference_data__calendar.full_date. Null when the source death_date is null or does not match the calendar.
      - name: normalized_enrollment_start_date
        description: Enrollment start date matched to reference_data__calendar.full_date. Null when the source enrollment_start_date is null or does not match the calendar.
      - name: normalized_enrollment_end_date
        description: Enrollment end date matched to reference_data__calendar.full_date. Null when the source enrollment_end_date is null or does not match the calendar.

