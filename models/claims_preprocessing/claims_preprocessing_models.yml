version: 2

models:

#### Claims Enrollment
## Final
  - name: claims_enrollment__flag_claims_with_enrollment
    description: This table contains claims with matching enrollment
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_claims_preprocessing
        {%- else -%}claims_preprocessing{%- endif -%}
      alias: flag_claims_with_enrollment
      tags:
        - claims_preprocessing
      materialized: table
    columns:
      - name: claim_id
        description: Unique identifier for each claim.
      - name: claim_line_number
        description: >
          Indicates the line number for the particular line of the claim.
      - name: person_id
        description: Unique identifier for each patient in the dataset.
      - name: payer
        description: Name of the payer.
      - name: plan
        description: Name of the plan.
      - name: data_source
        description: 'User-configured field that indicates the data source.'
      - name: member_month_key
        description: 'The unique combination of person_id, member_id, year_month, payer, plan, and data source.'
      - name: inferred_claim_start_year_month
        description: |
          The claim start date year and month.  If claim line start date is missing then the following column will be used, 
          in the following order if also NULL:  claim start date, admission date
      - name: inferred_claim_end_year_month
        description: |
          The claim end date year and month.  If claim line end date is missing then the following column will be used, 
          in the following order if also NULL:  claim end date, discharge date
      - name: inferred_claim_start_column_used
        description: The name of the column used to populated inferred_claim_start_year_month.
      - name: inferred_claim_end_column_used
        description: The name of the column used to populated inferred_claim_start_column_used.

  - name: claims_enrollment__flag_rx_claims_with_enrollment
    description: This table contains pharmacy claims with matching enrollment
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_claims_preprocessing
        {%- else -%}claims_preprocessing{%- endif -%}
      alias: flag_rx_claims_with_enrollment
      tags:
        - claims_preprocessing
      materialized: table
    columns:
      - name: claim_id
        description: Unique identifier for each claim.
      - name: claim_line_number
        description: >
          Indicates the line number for the particular line of the claim.
      - name: person_id
        description: Unique identifier for each patient in the dataset.
      - name: payer
        description: Name of the payer.
      - name: plan
        description: Name of the plan.
      - name: data_source
        description: 'User-configured field that indicates the data source.'
      - name: member_month_key
        description: 'The unique combination of person_id, member_id, year_month, payer, plan, and data source.'
      - name: paid_year_month
        description: the year and month of the date the pharmacy claim was paid.

###   Normalized Claim Input Layer
##    Final
  - name: normalized__eligibility
    description: |-
      This model assembles normalized eligibility records from the eligibility preprocessing models. It starts from int_eligibility_casting, selects the eligibility, demographic, source, metadata, and extension columns needed downstream, and left joins to int_eligibility_dates_normalized on person_id_key to replace birth_date, death_date, enrollment_start_date, and enrollment_end_date with calendar-normalized date values. It also left joins to int_eligibility_state_normalized on person_id_key to add normalized_state_name, fips_state_code, and fips_state_abbreviation.

      This model creates eligibility_id as a synthetic eligibility record key by concatenating person_id, member_id, normalized enrollment_start_date, normalized enrollment_end_date, payer, plan, and data_source with hyphen delimiters. It does not deduplicate eligibility records.
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_claims_preprocessing
        {%- else -%}claims_preprocessing{%- endif -%}
      alias: normalized_eligibility
      meta:
        dag:
          node_type: intermediate
      materialized: table
      tags:
        - normalized_input
        - claims_preprocessing
    columns:
      - name: eligibility_id
        description: Synthetic eligibility record key created by concatenating person_id, member_id, normalized enrollment_start_date, normalized enrollment_end_date, payer, plan, and data_source with hyphen delimiters.
        config:
          meta:
            is_primary_key: true
      - name: person_id
        description: Unique identifier for each person in the dataset.
      - name: member_id
        description: Identifier assigned by the payer or health plan for the covered member.
      - name: subscriber_id
        description: Identifier assigned by the payer or health plan for the subscriber or policyholder.
      - name: subscriber_relation
        description: Member relationship to the subscriber or policyholder.
      - name: enrollment_start_date
        description: Calendar-normalized first date of the enrollment span from int_eligibility_dates_normalized. This value is null when the source enrollment_start_date does not match reference_data__calendar.full_date.
      - name: enrollment_end_date
        description: Calendar-normalized last date of the enrollment span from int_eligibility_dates_normalized. This value is null when the source enrollment_end_date does not match reference_data__calendar.full_date.
      - name: payer
        description: Name of the payer or health insurer providing coverage during the enrollment span.
      - name: payer_type
        description: Type of payer providing coverage during the enrollment span.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/payer-type
      - name: plan
        description: Name of the health plan providing coverage during the enrollment span.
      - name: first_name
        description: Member first name from the eligibility input record.
      - name: middle_name
        description: Member middle name from the eligibility input record.
      - name: last_name
        description: Member last name from the eligibility input record.
      - name: name_suffix
        description: Member name suffix from the eligibility input record.
      - name: social_security_number
        description: Member Social Security number from the eligibility input record.
      - name: address
        description: Member street address from the eligibility input record.
      - name: city
        description: Member city from the eligibility input record.
      - name: state
        description: Source state value from the eligibility input record. This value is used by int_eligibility_state_normalized to derive ANSI/FIPS state fields.
      - name: zip_code
        description: Member ZIP code from the eligibility input record.
      - name: phone
        description: Member phone number from the eligibility input record.
      - name: email
        description: Member email address from the eligibility input record.
      - name: ethnicity
        description: Member ethnicity from the eligibility input record.
      - name: gender
        description: Biological sex of the member from the eligibility input record.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/gender
      - name: race
        description: Race of the member from the eligibility input record.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/race
      - name: birth_date
        description: Calendar-normalized birth date from int_eligibility_dates_normalized. This value is null when the source birth_date does not match reference_data__calendar.full_date.
      - name: death_date
        description: Calendar-normalized death date from int_eligibility_dates_normalized. This value is null when the source death_date is null or does not match reference_data__calendar.full_date.
      - name: death_flag
        description: Integer flag from the eligibility input record indicating whether the member is deceased.
      - name: original_reason_entitlement_code
        description: Original reason for Medicare entitlement code.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/medicare-orec
      - name: dual_status_code
        description: >
          Indicates whether the patient is dually eligible for Medicare and  Medicaid.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/medicare-dual-eligibility
      - name: medicare_status_code
        description: Indicates how the patient became eligible for Medicare.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/medicare-status
      - name: enrollment_status
        description: Enrollment status value from the eligibility input record.
      - name: hospice_flag
        description: Integer flag indicating whether the member is in hospice during the enrollment span.
      - name: institutional_snp_flag
        description: Integer flag indicating whether the enrollment span is associated with an institutional special needs plan.
      - name: medicaid_indicator
        description: Integer indicator for Medicaid coverage during the enrollment span. Generally 1 means yes and 0 means no.
        config:
          meta:
            data_type: integer
      - name: long_term_institutional_flag
        description: Integer flag indicating whether the member is in a long-term institutional setting during the enrollment span.
      - name: part_d_raf_type
        description: Part D risk adjustment factor type for the enrollment span. Null when the record is not related to Part D coverage.
        config:
          meta:
            data_type: varchar
      - name: low_income_subsidy_indicator
        description: Integer indicator for Low Income Subsidy, also known as Extra Help, during the enrollment span. Null when not applicable.
        config:
          meta:
            data_type: integer
      - name: metal_level
        description: ACA exchange metal tier for the health plan. Null when the record is not related to ACA exchange coverage.
        config:
          meta:
            data_type: varchar
      - name: csr_indicator
        description: Integer cost sharing reduction variant indicator for ACA exchange coverage. Null when not applicable.
        config:
          meta:
            data_type: integer
      - name: enrollment_duration_months
        description: Number of months covered during the benefit year for ACA exchange enrollment. Null when not applicable.
        config:
          meta:
            data_type: integer
      - name: esrd_status
        description: Integer indicator for end-stage renal disease status from the eligibility input record. Null when not applicable.
        config:
          meta:
            data_type: integer
      - name: transplant_duration_months
        description: Number of months since kidney transplant from the eligibility input record. Null when not applicable.
        config:
          meta:
            data_type: integer
      - name: group_id
        description: Identifier for the employer, purchasing group, or other group under which the member is enrolled.
      - name: group_name
        description: Name of the employer, purchasing group, or other group under which the member is enrolled.
      - name: fips_state_code
        description: ANSI/FIPS state code matched from the source state value in int_eligibility_state_normalized.
      - name: normalized_state_name
        description: ANSI/FIPS state name matched from the source state value in int_eligibility_state_normalized.
      - name: fips_state_abbreviation
        description: ANSI/FIPS state abbreviation matched from the source state value in int_eligibility_state_normalized.
      - name: file_date
        description: Timestamp associated with the source eligibility file, typically reflecting the reporting period for the file.
      - name: file_name
        description: Name of the source file from which the eligibility record was loaded.
      - name: ingest_datetime
        description: Timestamp when the source eligibility file was ingested into the data warehouse or landed in cloud storage.
      - name: tuva_last_run
        description: Timestamp value from the tuva_last_run dbt variable for the current dbt invocation.

      - name: data_source
        description: User-configured field that identifies the source system, payer feed, or other origin of the eligibility record.
  - name: normalized__eligibility_remove_duplicates
    description: |-
      This model creates eligibility-derived patient records and removes duplicate records for each person_id and data_source. When multiple eligibility records exist, it keeps the record with the latest enrollment_end_date, treating null enrollment_end_date as 2050-01-01.

      Primary key: person_id, data_source.
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_claims_preprocessing
        {%- else -%}claims_preprocessing{%- endif -%}
      alias: normalized_eligibility_remove_duplicates
      meta:
        dag:
          node_type: intermediate
      materialized: table
      tags:
        - normalized_input
        - claims_preprocessing
    columns:
      - name: person_id
        description: Unique identifier for each person in the dataset.
        config:
          meta:
            is_primary_key: true
      - name: name_suffix
        description: Patient's name suffix (e.g. Jr., Sr., III, etc).
      - name: first_name
        description: Patient's first name.
      - name: middle_name
        description: Patient's middle name.
      - name: last_name
        description: Patient's last name.
      - name: sex
        description: Biological sex of the patient.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/gender
      - name: race
        description: Race of the patient.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/race
      - name: birth_date
        description: Date the patient was born.
      - name: death_date
        description: Date the patient died.
      - name: death_flag
        description: Flag indicating if the patient is deceased
      - name: social_security_number
        description: Patient's social security number.
      - name: address
        description: Patient's street address.
      - name: city
        description: Patient's city of address.
      - name: state
        description: State the patient lives in (most recent known address).
      - name: zip_code
        description: Zip code the patient lives in (most recent known address).
      - name: county
        description: County where the patient lives.
      - name: latitude
        description: Latitude of the patient's address.
      - name: longitude
        description: Longitude of the patient's address.
      - name: phone
        description: Patient's phone number.
      - name: email
        description: Patient's email address.
      - name: ethnicity
        description: Patient's ethnicity
      - name: data_source
        description: >
          User-configured field that indicates the data source (e.g. typically  named after the payer and state "BCBS Tennessee").
        config:
          meta:
            is_primary_key: true
      - name: file_name
        description: 'The file name of the source file.'
      - name: ingest_datetime
        description: 'The date and time the source file was ingested into the data warehouse or landed in cloud storage.'
      - name: tuva_last_run
        description: >
          The last time the data was refreshed.  Generated by  `dbt_utils.pretty_time` as the local time of the `dbt run`  environment.  Timezone is configurable via the `tuva_last_run` var.

  - name: normalized_input__medical_claim
    description: |
      The medical claim table contains information on services rendered to 
      patients and billed by the provider to the insurer as claims.
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_claims_preprocessing
        {%- else -%}claims_preprocessing{%- endif -%}
      alias: normalized_input_medical_claim
      materialized: table
      tags:
        - normalized_input
        - claims_preprocessing
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - claim_id
              - claim_line_number
              - data_source        
    columns:
      - name: claim_id
        description: Unique identifier for each claim.
      - name: claim_line_number
        description: >
          Indicates the line number for the particular line of the claim.
        data_type: integer
      - name: claim_type
        description: >
          Indicates whether the claim is professional (CMS-1500), institutional  (UB-04), dental, or vision.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/claim-type
      - name: person_id
        description: Unique identifier for each patient in the dataset.
      - name: member_id
        description: >
          Identifier that links a patient to a particular insurance product or  health plan. A patient can have more than one member_id because they  can have more than one insurance product/plan.
      - name: payer
        description: Name of the payer
      - name: plan
        description: Name of the plan
      - name: claim_start_date
        description: Start date for the claim.
      - name: claim_end_date
        description: End date for the claim.
      - name: claim_line_start_date
        description: Start date for the claim line.
      - name: claim_line_end_date
        description: End date for the claim line.
      - name: admission_date
        description: Admission date for the claim (inpatient claims only).
      - name: discharge_date
        description: Discharge date for the claim (inpatient claims only).
      - name: admit_source_code
        description: >
          Indicates where the patient was before the healthcare encounter  (inpatient claims only).
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/admit-source
      - name: admit_type_code
        description: Indicates the type of admission (inpatient claims only).
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/admit-type
      - name: discharge_disposition_code
        description: >
          Indicates the type of setting the patient was discharged to  (institutional inpatient claims only).
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/discharge-disposition
      - name: place_of_service_code
        description: Place of service for the claim (professional claims only).
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/place-of-service
      - name: bill_type_code
        description: Bill type code for the claim (institutional claims only).
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/bill-type
      - name: drg_code_type
        description: 'The DRG system used for the claim.'
      - name: drg_code
        description: 'The DRG code on the claim.'
      - name: revenue_center_code
        description: >
          Revenue center code for the claim line (institutional only and  typically multiple codes per claim).
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/revenue-center
      - name: service_unit_quantity
        description: The number of units for the particular revenue center code.
        data_type: float
      - name: hcpcs_code
        description: HCPCS level 1 or level 2 code for the claim line.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/hcpcs-level-2
      - name: hcpcs_modifier_1
        description: 1st modifier for HCPCS code.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/hcpcs-level-2
      - name: hcpcs_modifier_2
        description: 2nd modifier for HCPCS code.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/hcpcs-level-2
      - name: hcpcs_modifier_3
        description: 3rd modifier for HCPCS code.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/hcpcs-level-2
      - name: hcpcs_modifier_4
        description: 4th modifier for HCPCS code.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/hcpcs-level-2
      - name: hcpcs_modifier_5
        description: 5th modifier for HCPCS code.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/hcpcs-level-2
      - name: rendering_npi
        description: >
          Rendering NPI for the claim (typically represents the physician or  entity providing services).
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/provider
            terminology_note: "**Note: this terminology set is too large to be loaded as a seed and is instead loaded from public cloud storage for supported adapters."
      - name: billing_npi
        description: >
          Billing NPI for the claim (typically represents organization billing  the claim).
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/provider
            terminology_note: "**Note: this terminology set is too large to be loaded as a seed and is instead loaded from public cloud storage for supported adapters."
      - name: facility_npi
        description: >
          Facility NPI for the claim (typically represents the facility where  services were performed).
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/provider
            terminology_note: "**Note: this terminology set is too large to be loaded as a seed and is instead loaded from public cloud storage for supported adapters."
      - name: paid_date
        description: The date the claim was paid.
      - name: paid_amount
        description: The total amount paid on the claim by the insurer.
      - name: allowed_amount
        description: >
          The total amount allowed (includes amount paid by the insurer and  patient) on the claim.
      - name: charge_amount
        description: The total amount charged on the claim by the provider.
      - name: coinsurance_amount
        description: The total coinsurance charged on the claim by the provider.
      - name: copayment_amount
        description: The total copayment charged on the claim by the provider.
      - name: deductible_amount
        description: The total amount charged on the claim by the provider.
      - name: total_cost_amount
        description: The total amount paid on the claim by different parties.
      - name: diagnosis_code_type
        description: Indicates the type of diagnosis code (e.g. ICD-10-CM).
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/code-type
      - name: diagnosis_code_1
        description: 1st ICD (9 or 10) CM diagnosis code on the claim.
        config:
