##    Staging
  - name: int_eligibility_casting
    description: |-
      This model performs the following data transformations:
      1. Casts fields to the appropriate data types expected by the input_layer__eligibility table. This is meant to account for data types if they are not cast by the user in the input layer.
      2. Passes through all column extensions that the user has created in the input layer with the x_ extension prefix.
      3. Creates a synthetic join key called person_id_key. The person_id_key is created by concatenating person_id, member_id, data_source, payer, plan, enrollment_start_date, and enrollment_end_date. All key components except person_id are coalesced to an empty string before concatenation.

      Primary key: person_id_key.
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_claims_preprocessing
        {%- else -%}claims_preprocessing{%- endif -%}
      alias: int_eligibility_casting
      meta:
        dag:
          node_type: intermediate
      materialized: table
      tags:
        - normalized_input
        - claims_preprocessing
    columns:
      - name: person_id
        description: Unique identifier for each person in the dataset, cast to string from input_layer__eligibility.
      - name: person_id_key
        description: Synthetic join key created by concatenating person_id, member_id, data_source, payer, plan, enrollment_start_date, and enrollment_end_date. All key components except person_id are coalesced to an empty string before concatenation.
      - name: member_id
        description: Identifier assigned by the payer or health plan for the covered member, cast to string from input_layer__eligibility.
      - name: subscriber_id
        description: Identifier assigned by the payer or health plan for the subscriber or policyholder, cast to string from input_layer__eligibility.
      - name: subscriber_relation
        description: Member relationship to the subscriber or policyholder, cast to string from input_layer__eligibility.
      - name: enrollment_start_date
        description: Source enrollment start date cast to date from input_layer__eligibility before calendar normalization.
      - name: enrollment_end_date
        description: Source enrollment end date cast to date from input_layer__eligibility before calendar normalization.
      - name: payer
        description: Name of the payer or health insurer, cast to string from input_layer__eligibility.
      - name: payer_type
        description: Type of payer, cast to string from input_layer__eligibility.
      - name: plan
        description: Name of the health plan, cast to string from input_layer__eligibility.
      - name: first_name
        description: Member first name cast to string from input_layer__eligibility.
      - name: middle_name
        description: Member middle name cast to string from input_layer__eligibility.
      - name: last_name
        description: Member last name cast to string from input_layer__eligibility.
      - name: name_suffix
        description: Member name suffix cast to string from input_layer__eligibility.
      - name: social_security_number
        description: Member Social Security number cast to string from input_layer__eligibility.
      - name: address
        description: Member street address cast to string from input_layer__eligibility.
      - name: city
        description: Member city cast to string from input_layer__eligibility.
      - name: state
        description: Source state value cast to string from input_layer__eligibility before ANSI/FIPS state normalization.
      - name: zip_code
        description: Member ZIP code cast to string from input_layer__eligibility.
      - name: phone
        description: Member phone number cast to string from input_layer__eligibility.
      - name: email
        description: Member email address cast to string from input_layer__eligibility.
      - name: ethnicity
        description: Member ethnicity cast to string from input_layer__eligibility.
      - name: gender
        description: Biological sex of the member, cast to string from input_layer__eligibility.
      - name: race
        description: Race of the member, cast to string from input_layer__eligibility.
      - name: birth_date
        description: Source birth date cast to date from input_layer__eligibility before calendar normalization.
      - name: death_date
        description: Source death date cast to date from input_layer__eligibility before calendar normalization.
      - name: death_flag
        description: Source death flag cast to integer from input_layer__eligibility.
      - name: original_reason_entitlement_code
        description: Original reason for Medicare entitlement code, cast to string from input_layer__eligibility.
      - name: dual_status_code
        description: Medicare-Medicaid dual eligibility status code, cast to string from input_layer__eligibility.
      - name: medicare_status_code
        description: Medicare status code, cast to string from input_layer__eligibility.
      - name: enrollment_status
        description: Enrollment status value, cast to string from input_layer__eligibility.
      - name: hospice_flag
        description: Hospice flag cast to integer from input_layer__eligibility.
      - name: institutional_snp_flag
        description: Institutional special needs plan flag cast to integer from input_layer__eligibility.
      - name: medicaid_indicator
        description: Integer indicator for Medicaid coverage during the enrollment span. Generally 1 means yes and 0 means no.
        config:
          meta:
            data_type: integer
      - name: long_term_institutional_flag
        description: Long-term institutional flag cast to integer from input_layer__eligibility.
      - name: part_d_raf_type
        description: Part D risk adjustment factor type for the enrollment span. Null when the record is not related to Part D coverage.
        config:
          meta:
            data_type: varchar
      - name: low_income_subsidy_indicator
        description: Integer indicator for Low Income Subsidy, also known as Extra Help, during the enrollment span. Null when not applicable.
        config:
          meta:
            data_type: integer
      - name: metal_level
        description: ACA exchange metal tier for the health plan. Null when the record is not related to ACA exchange coverage.
        config:
          meta:
            data_type: varchar
      - name: csr_indicator
        description: Integer cost sharing reduction variant indicator for ACA exchange coverage. Null when not applicable.
        config:
          meta:
            data_type: integer
      - name: enrollment_duration_months
        description: Number of months covered during the benefit year for ACA exchange enrollment. Null when not applicable.
        config:
          meta:
            data_type: integer
      - name: esrd_status
        description: Integer indicator for end-stage renal disease status from the eligibility input record. Null when not applicable.
        config:
          meta:
            data_type: integer
      - name: transplant_duration_months
        description: Number of months since kidney transplant from the eligibility input record. Null when not applicable.
        config:
          meta:
            data_type: integer
      - name: group_id
        description: Group identifier cast to string from input_layer__eligibility.
      - name: group_name
        description: Group name cast to string from input_layer__eligibility.
      - name: file_name
        description: Source file name cast to string from input_layer__eligibility.
      - name: file_date
        description: Source file date cast to timestamp from input_layer__eligibility.
      - name: ingest_datetime
        description: Source file ingest timestamp cast to timestamp from input_layer__eligibility.
      - name: tuva_last_run
        description: Timestamp value from the tuva_last_run dbt variable for the current dbt invocation.

      - name: data_source
        description: User-configured source identifier cast to string from input_layer__eligibility.
  - name: normalized_input__stg_medical_claim
    config:
      materialized: ephemeral
      tags:
        - normalized_input
        - claims_preprocessing

