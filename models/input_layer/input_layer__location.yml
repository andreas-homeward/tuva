version: 2
models:
  - name: input_layer__location
    description: |-
      The location table contains information about physical locations where clinical care is delivered, documented, or managed. A location may represent a facility, clinic, department, practice site, laboratory, imaging center, or other service location.

      This table is intended to have one record per location ID and data source. The location_id field should identify the location within the clinical source system and can be referenced by other clinical input layer tables, such as appointment and immunization, when those records are associated with a location.

      Primary key: location_id, data_source.
    tests:
      - dbt_utils.unique_combination_of_columns:
          config:
            severity: error
            enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
            tags:
              - tuva_dqi_sev_1
              - dqi
              - dqi_service_categories
              - dqi_ccsr
              - dqi_cms_chronic_conditions
              - dqi_tuva_chronic_conditions
              - dqi_cms_hccs
              - dqi_ed_classification
              - dqi_financial_pmpm
              - dqi_quality_measures
              - dqi_readmission
          arguments:
            combination_of_columns:
              - location_id
              - data_source
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_input_layer{% else %}input_layer{%- endif -%}
      tags: input_layer
      materialized: view
    columns:
      - name: location_id
        description: Identifier for a location within a data source. This should be the stable source system identifier for the facility, department, clinic, practice site, or other location.
        required_for_data_marts: []
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: error
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_service_categories
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
          - not_null:
              config:
                severity: error
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_service_categories
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: npi
        description: National Provider Identifier associated with the location, when available. For facilities or organizations, this should generally be an organization NPI rather than an individual practitioner NPI. Leave null when the location does not have an NPI.
        required_for_data_marts: []
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_5
                  - dqi
        config:
          meta:
            data_type: varchar
      - name: name
        description: Name of the location as represented in the source system.
        required_for_data_marts: []
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_5
                  - dqi
        config:
          meta:
            data_type: varchar
      - name: facility_type
        description: Type or category of location, for example hospital, clinic, emergency department, ambulatory surgery center, laboratory, imaging center, or department. Use the source system value.
        required_for_data_marts: []
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
