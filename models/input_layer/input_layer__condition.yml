version: 2
models:
  - name: input_layer__condition
    description: >-
      The condition table is intended to have one record per condition record per data source. This table stores diagnoses, problems, and other condition records from clinical source systems, including problem list entries, encounter diagnoses, admitting diagnoses, and discharge diagnoses when those records are available from the source system.


      A condition may be linked to an encounter when that relationship exists, but not every condition will have an encounter_id. The source code fields should preserve the condition coding from the source system. Tuva normalizes supported source code systems downstream in core.condition.


      Claims-derived diagnoses should be mapped to the medical_claim input layer table. They are added to core.condition downstream from medical claims, not from this clinical input layer table.


      Primary key: condition_id, data_source.
    tests:
      - dbt_utils.unique_combination_of_columns:
          config:
            severity: error
            enabled: "{{ var('enable_input_layer_testing', true) | as_bool }}"
            tags:
              - tuva_dqi_sev_1
              - dqi
              - dqi_service_categories
              - dqi_ccsr
              - dqi_cms_chronic_conditions
              - dqi_tuva_chronic_conditions
              - dqi_cms_hccs
              - dqi_ed_classification
              - dqi_financial_pmpm
              - dqi_quality_measures
              - dqi_readmission
          arguments:
            combination_of_columns:
              - condition_id
              - data_source
    config:
      schema: "{%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_input_layer{% else %}input_layer{%- endif -%}\n"
      tags: input_layer
      materialized: view
    columns:
      - name: condition_id
        description: >-
          Identifier for a condition record within a data source. This value should be populated on every record and should uniquely identify the condition when combined with data_source.
        required_for_data_marts: []
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: error
                enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_service_categories
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
          - not_null:
              config:
                severity: error
                enabled: "{{ var('enable_input_layer_testing', true) | as_bool }}"
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_service_categories
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: person_id
        description: >-
          Globally unique identifier for the person associated with the condition. A person may have multiple patient IDs over time or across clinical source systems, but person_id should remain stable for the same person.
        required_for_data_marts: ['ahrq_measures', 'ccsr', 'cms_chronic_conditions', 'cms_hccs', 'hcc_recapture', 'hcc_suspecting', 'quality_measures', 'semantic_layer', 'tuva_chronic_conditions']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: "{{ var('enable_input_layer_testing', true) | as_bool }}"
                tags:
                  - tuva_dqi_sev_1
                  - dqi
        config:
          meta:
            data_type: varchar
      - name: patient_id
        description: >-
          Identifier that links the person to a particular clinical source system, for example a medical record number or MRN. A single person may have multiple patient IDs.
        required_for_data_marts: []
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_quality_measures
        config:
          meta:
            data_type: varchar
      - name: encounter_id
        description: >-
          Identifier for the clinical encounter associated with the condition. Populate this when the condition was documented during, or is linked to, a clinical encounter. Leave null when the condition is not encounter-specific.
        required_for_data_marts: ['ahrq_measures', 'ccsr', 'quality_measures', 'semantic_layer']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_quality_measures
        config:
          meta:
            data_type: varchar
      - name: recorded_date
        description: >-
          Date the condition was recorded or documented in the source system, formatted as YYYY-MM-DD.
        required_for_data_marts: ['cms_chronic_conditions', 'cms_hccs', 'hcc_recapture', 'hcc_suspecting', 'quality_measures', 'tuva_chronic_conditions']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_quality_measures
          - the_tuva_project.expect_column_values_to_be_of_type:
              config:
                severity: warn
                enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_quality_measures
              arguments:
                column_type: date
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: "{{ var('enable_input_layer_testing', true) | as_bool }}"
                tags:
                  - tuva_dqi_sev_5
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_quality_measures
          - the_tuva_project.expect_column_values_to_be_between:
              config:
                severity: warn
                enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_quality_measures
              arguments:
                min_value: "'1900-01-01'"
                max_value: "'2100-01-01'"
                strictly: false
        config:
          meta:
            data_type: date
      - name: onset_date
        description: >-
          Date the condition began or was first clinically present, formatted as YYYY-MM-DD. Leave null when the onset date is unknown or unavailable.
        required_for_data_marts: []
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
                tags:
                  - tuva_dqi_sev_1
                  - dqi
          - the_tuva_project.expect_column_values_to_be_of_type:
              config:
                severity: warn
                enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
                tags:
                  - tuva_dqi_sev_2
                  - dqi
              arguments:
                column_type: date
          - the_tuva_project.expect_column_values_to_be_between:
              config:
                severity: warn
                enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
                tags:
                  - tuva_dqi_sev_3
                  - dqi
              arguments:
                min_value: "'1900-01-01'"
                max_value: "'2100-01-01'"
                strictly: false
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: "{{ var('enable_input_layer_testing', true) | as_bool }}"
                tags:
                  - tuva_dqi_sev_5
                  - dqi
        config:
          meta:
            data_type: date
      - name: resolved_date
        description: >-
          Date the condition resolved or became inactive, formatted as YYYY-MM-DD. Leave null when the condition is active, unresolved, or the resolved date is unknown.
        required_for_data_marts: []
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
                tags:
                  - tuva_dqi_sev_1
                  - dqi
          - the_tuva_project.expect_column_values_to_be_of_type:
              config:
                severity: warn
                enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
                tags:
                  - tuva_dqi_sev_2
                  - dqi
              arguments:
                column_type: date
          - the_tuva_project.expect_column_values_to_be_between:
              config:
                severity: warn
                enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_quality_measures
              arguments:
                min_value: "'1900-01-01'"
                max_value: "'2100-01-01'"
                strictly: false
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: "{{ var('enable_input_layer_testing', true) | as_bool }}"
                tags:
                  - tuva_dqi_sev_5
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_quality_measures
        config:
          meta:
            data_type: date
      - name: status
        description: >-
          Source status of the condition record, such as active, resolved, inactive, historical, suspected, or entered-in-error. Preserve the source status value when available.
        required_for_data_marts: ['hcc_recapture']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
                tags:
                  - tuva_dqi_sev_1
                  - dqi
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: "{{ var('enable_input_layer_testing', true) | as_bool }}"
                tags:
                  - tuva_dqi_sev_5
                  - dqi
        config:
          meta:
            data_type: varchar
      - name: condition_type
        description: >-
          Category of condition record, such as problem, encounter diagnosis, admitting diagnosis, or discharge diagnosis. This field helps distinguish problem list conditions from diagnoses documented for an encounter in a clinical source system.
        required_for_data_marts: ['cms_hccs', 'hcc_recapture', 'hcc_suspecting']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
                tags:
                  - tuva_dqi_sev_1
                  - dqi
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: "{{ var('enable_input_layer_testing', true) | as_bool }}"
                tags:
                  - tuva_dqi_sev_5
                  - dqi
        config:
          meta:
            data_type: varchar
      - name: source_code_type
        description: >-
          Code system for source_code. Accepted values are icd-10-cm, icd-9-cm, and snomed-ct.
        required_for_data_marts: ['quality_measures']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_quality_measures
          - accepted_values:
              config:
                severity: warn
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_cms_hccs
                  - dqi_quality_measures
              arguments:
                values:
                  - icd-10-cm
                  - icd-9-cm
                  - snomed-ct
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: "{{ var('enable_input_layer_testing', true) | as_bool }}"
                tags:
                  - tuva_dqi_sev_5
                  - dqi
        config:
          meta:
            data_type: varchar
      - name: source_code
        description: >-
          Condition code from the source system before Tuva normalization. For ICD diagnosis codes, the source may include or omit decimal formatting.
        required_for_data_marts: ['quality_measures']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_quality_measures
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: "{{ var('enable_input_layer_testing', true) | as_bool }}"
                tags:
                  - tuva_dqi_sev_5
                  - dqi
                  - dqi_quality_measures
        config:
          meta:
            data_type: varchar
      - name: source_description
        description: >-
          Human-readable description of the source condition code or condition record, when available from the source system.
        required_for_data_marts: []
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
                tags:
                  - tuva_dqi_sev_1
                  - dqi
        config:
          meta:
            data_type: varchar
      - name: condition_rank
        description: >-
          Numeric rank of the condition when the source provides diagnosis ordering. A value of 1 generally represents the primary diagnosis, and values greater than 1 represent secondary diagnoses. Leave null when the condition is not ranked, such as many problem list records.
        required_for_data_marts: ['ccsr', 'cms_hccs', 'hcc_suspecting']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
                tags:
                  - tuva_dqi_sev_1
                  - dqi
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: "{{ var('enable_input_layer_testing', true) | as_bool }}"
                tags:
                  - tuva_dqi_sev_5
                  - dqi
        config:
          meta:
            data_type: number
      - name: present_on_admit_code
        description: >-
          Present-on-admission indicator for the condition, when applicable. This is most relevant for inpatient facility diagnoses and should be left null when not applicable or unavailable.
        required_for_data_marts: []
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
                tags:
                  - tuva_dqi_sev_1
                  - dqi
        config:
          meta:
            data_type: varchar
      - name: ingest_datetime
        description: >-
          Date and time the source condition record was loaded into the data warehouse. This is useful when multiple versions of the same condition record are received over time.
        required_for_data_marts: []
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
                tags:
                  - tuva_dqi_sev_1
                  - dqi
          - the_tuva_project.expect_column_values_to_be_in_type_list:
              config:
                severity: warn
                enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
                tags:
                  - tuva_dqi_sev_2
                  - dqi
              arguments:
                column_type_list:
                  - date
                  - datetime
                  - time
                  - timestamp
                  - timestamp_ntz
                  - timestampntz
                  - timestamp_ltz
                  - timestampltz
                  - timestamp_tz
                  - timestamptz
                  - timestamp with time zone
                  - timestamp without time zone
                  - datetime2
                  - datetimeoffset
        config:
          meta:
            data_type: timestamp
      - name: data_source
        description: >-
          User-defined name that identifies the source of the condition data, for example Epic, Athena Health, or Cerner. This value should be populated on every record.
        required_for_data_marts: ['ahrq_measures', 'ccsr', 'cms_chronic_conditions', 'cms_hccs', 'hcc_recapture', 'hcc_suspecting', 'semantic_layer']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: "{{ (var('enable_input_layer_testing', true)) | as_bool }}"
                tags:
                  - tuva_dqi_sev_1
                  - dqi
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: "{{ var('enable_input_layer_testing', true) | as_bool }}"
                tags:
                  - tuva_dqi_sev_5
                  - dqi
        config:
          meta:
            data_type: varchar
            is_primary_key: true
