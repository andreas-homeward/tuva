      - name: phone
        description: Patient phone number as represented in the source system.
        required_for_data_marts: ['semantic_layer']
        tests:
          - dbt_expectations.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ ((target.type != ''fabric'') and var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
        config:
          meta:
            data_type: varchar
      - name: email
        description: Patient email address as represented in the source system.
        required_for_data_marts: ['semantic_layer']
        tests:
          - dbt_expectations.expect_column_to_exist:
