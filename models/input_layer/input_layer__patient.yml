      - name: data_source
        description: User-defined name that identifies the clinical source, for example Epic, Athena Health, or Cerner. This value should be populated on every record.
        required_for_data_marts: ['ahrq_measures', 'ed_classification', 'hcc_recapture', 'semantic_layer']
        tests:
