          NPI for the billing provider or organization responsible for submitting the claim. This is generally header-level and should be consistent across lines for the same claim_id. NPIs should be 10-digit identifiers.
        required_for_data_marts: ['encounters', 'semantic_layer']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
          - the_tuva_project.expect_column_value_lengths_to_equal:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
              arguments:
                value: 10
          - the_tuva_project.expect_column_values_to_match_regex:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
              arguments:
                regex: ^[0-9]{10}$
                pattern1: '[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]'
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_5
                  - dqi
        config:
          meta:
            data_type: varchar
      - name: billing_tin
        description: >-
          Tax Identification Number for the billing provider or organization.
        required_for_data_marts: ['semantic_layer']
        tests:
