version: 2
models:
  - name: input_layer__medical_claim
    description: >-
      The medical_claim table is intended to have one record per medical claim line per data source. A medical claim represents healthcare services or supplies billed by a provider and adjudicated by a payer. A single claim may have multiple claim lines, so claim_id identifies the claim and claim_line_number identifies the specific line within that claim.


      This table should contain final adjudicated claim lines after the source data has been filtered or transformed to account for adjustments, denials, reversals, voids, and replacement claims. If non-final claim activity is included, downstream cost, utilization, quality, and risk adjustment outputs may be incorrect. Header-level fields, such as claim_type, person_id, payer, plan, claim_start_date, claim_end_date, admission_date, and discharge_date, should be consistent across all lines for the same claim_id. Line-level fields, such as claim_line_start_date, claim_line_end_date, revenue_center_code, hcpcs_code, service_unit_quantity, and payment amounts, may vary across claim lines.


      Primary key: claim_id, claim_line_number, data_source.
    tests:
      - dbt_utils.unique_combination_of_columns:
          config:
            severity: error
            enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
            tags:
              - tuva_dqi_sev_1
              - dqi
              - dqi_service_categories
              - dqi_ccsr
              - dqi_cms_chronic_conditions
              - dqi_tuva_chronic_conditions
              - dqi_cms_hccs
              - dqi_ed_classification
              - dqi_financial_pmpm
              - dqi_quality_measures
              - dqi_readmission
          arguments:
            combination_of_columns:
              - claim_id
              - claim_line_number
              - data_source
      - the_tuva_project.expect_column_pair_values_A_to_be_greater_than_B:
          config:
            severity: warn
            enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
            tags:
              - tuva_dqi_sev_3
              - dqi
              - dqi_cms_chronic_conditions
              - dqi_tuva_chronic_conditions
              - dqi_cms_hccs
              - dqi_ed_classification
              - dqi_financial_pmpm
              - dqi_quality_measures
              - dqi_readmission
          arguments:
            column_A: claim_end_date
            column_B: claim_start_date
            or_equal: true
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_input_layer{% else %}input_layer{%- endif -%}
      tags: input_layer
      materialized: view
    columns:
      - name: claim_id
        description: >-
          Identifier for a medical claim. A claim may contain multiple claim lines, so the same claim_id may appear on multiple rows. This value should be populated on every row and should remain consistent across all lines for the same claim.
        required_for_data_marts: ['ccsr', 'claims_enrollment', 'cms_chronic_conditions', 'cms_hccs', 'encounters', 'financial_pmpm', 'hcc_recapture', 'hcc_suspecting', 'provider_attribution', 'quality_measures', 'semantic_layer', 'service_categories']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: error
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_service_categories
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
          - not_null:
              config:
                severity: error
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_service_categories
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: claim_line_number
        description: >-
          Line number for the claim line represented by the row. Values should be positive integers and should uniquely identify each line within a claim_id. If the source does not provide reliable line numbers, create them during mapping.
        required_for_data_marts: ['claims_enrollment', 'cms_hccs', 'encounters', 'financial_pmpm', 'provider_attribution', 'semantic_layer', 'service_categories']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: error
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_service_categories
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
          - not_null:
              config:
                severity: error
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_service_categories
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
        config:
          meta:
            data_type: integer
            is_primary_key: true
      - name: claim_type
        description: >-
          Header-level classification of the medical claim as professional, institutional, or undetermined. This value should be consistent across all lines for the same claim_id. If claim_type is not provided by the source, derive it from claim content: professional claims should have a place_of_service_code and should not have institutional-only fields such as bill_type_code or revenue_center_code; institutional claims should have bill_type_code and revenue_center_code and should not have place_of_service_code. If the source does not clearly support either pattern, use undetermined until the classification can be resolved. Some payers populate institutional claims with place_of_service_code values or create nonstandard place of service codes, so review source-specific behavior carefully before deriving claim_type.
        required_for_data_marts: ['cms_hccs', 'encounters', 'semantic_layer', 'service_categories']
        tests:
          - the_tuva_project.expect_column_unique_value_count_to_be_between:
              description: A claim cannot be both professional and institutional within the same claim id.
              config:
                severity: error
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                meta:
                  dqi_test_description: A claim cannot be both professional and institutional within the same claim id.
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_service_categories
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
              arguments:
                min_value: 1
                max_value: 1
                group_by:
                  - claim_id
                strictly: false
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_cms_hccs
          - not_null:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_cms_hccs
          - accepted_values:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_cms_hccs
              arguments:
                values:
                  - professional
                  - institutional
                  - undetermined
        config:
          meta:
            data_type: varchar
      - name: person_id
        description: >-
          Globally unique identifier for the person who received care. A person may have multiple member IDs over time or across plans, but person_id should remain stable for the same person.
        required_for_data_marts: ['ahrq_measures', 'ccsr', 'claims_enrollment', 'cms_chronic_conditions', 'cms_hccs', 'ed_classification', 'encounters', 'financial_pmpm', 'hcc_recapture', 'hcc_suspecting', 'provider_attribution', 'quality_measures', 'readmissions', 'semantic_layer', 'tuva_chronic_conditions']
        tests:
          - the_tuva_project.expect_column_unique_value_count_to_be_between:
              description: A claim should not belong to two different people.
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                meta:
                  dqi_test_description: A claim should not belong to two different people.
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_readmission
              arguments:
                min_value: 1
                max_value: 1
                group_by:
                  - claim_id
                strictly: false
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_readmission
          - not_null:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_readmission
        config:
          meta:
            data_type: varchar
      - name: member_id
        description: >-
          Identifier assigned by the payer or health plan for the person's coverage. This should identify the member associated with the claim and should be consistent across all lines for the same claim_id.
        required_for_data_marts: ['claims_enrollment', 'financial_pmpm']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
        config:
          meta:
            data_type: varchar
      - name: payer
        description: >-
          Name of the payer responsible for the claim, for example Aetna, Blue Cross Blue Shield, or Medicare FFS. If the source data is scoped to one payer, this value may be hard-coded.
        required_for_data_marts: ['claims_enrollment', 'cms_hccs', 'financial_pmpm', 'hcc_recapture', 'hcc_suspecting', 'semantic_layer']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_financial_pmpm
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_5
                  - dqi
                  - dqi_financial_pmpm
        config:
          meta:
            data_type: varchar
      - name: plan
        description: >-
          Name of the health insurance plan or product associated with the claim, for example Aetna PPO or Humana HMO. If unavailable in the source, this value may be hard-coded to a stable plan value for the data source.
        required_for_data_marts: ['claims_enrollment', 'cms_hccs', 'financial_pmpm', 'semantic_layer']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_financial_pmpm
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_5
                  - dqi
                  - dqi_financial_pmpm
        config:
          meta:
            data_type: varchar
      - name: claim_start_date
        description: >-
          Header-level start date for the claim, formatted as YYYY-MM-DD. This value should be consistent across all lines for the same claim_id.
        required_for_data_marts: ['claims_enrollment', 'cms_chronic_conditions', 'cms_hccs', 'encounters', 'financial_pmpm', 'provider_attribution', 'quality_measures', 'semantic_layer', 'service_categories']
        tests:
          - the_tuva_project.expect_column_unique_value_count_to_be_between:
              description: A claim should not have multiple start dates within the same claim id.
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                meta:
                  dqi_test_description: A claim should not have multiple start dates within the same claim id.
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
              arguments:
                min_value: 1
                max_value: 1
                group_by:
                  - claim_id
                strictly: false
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
          - the_tuva_project.expect_column_values_to_be_between:
              description: This is a test on all dates to see if they are within a reasonable range.
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                meta:
                  dqi_test_description: 'This is a test on all dates to see if they are within a reasonable range. '
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
              arguments:
                min_value: '''1900-01-02'''
                max_value: '''2050-01-02'''
                strictly: false
          - the_tuva_project.expect_column_values_to_be_of_type:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
              arguments:
                column_type: date
          - not_null:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
        config:
          meta:
            data_type: date
      - name: claim_end_date
        description: >-
          Header-level end date for the claim, formatted as YYYY-MM-DD. This value should be consistent across all lines for the same claim_id and should be greater than or equal to claim_start_date.
        required_for_data_marts: ['cms_hccs', 'encounters', 'financial_pmpm', 'provider_attribution', 'quality_measures', 'semantic_layer', 'service_categories']
        tests:
          - the_tuva_project.expect_column_unique_value_count_to_be_between:
              description: A claim should not have multiple end dates within the same claim id.
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                meta:
                  dqi_test_description: A claim should not have multiple end dates within the same claim id.
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
              arguments:
                min_value: 1
                max_value: 1
                group_by:
                  - claim_id
                strictly: false
          - not_null:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
          - the_tuva_project.expect_column_values_to_be_between:
              description: This is a test on all dates to see if they are within a reasonable range.
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                meta:
                  dqi_test_description: 'This is a test on all dates to see if they are within a reasonable range. '
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
              arguments:
                min_value: '''1900-01-02'''
                max_value: '''2050-01-02'''
                strictly: false
          - the_tuva_project.expect_column_values_to_be_of_type:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
              arguments:
                column_type: date
        config:
          meta:
            data_type: date
      - name: claim_line_start_date
        description: >-
          Start date for the service or item represented by the claim line, formatted as YYYY-MM-DD. This may differ across lines within the same claim.
        required_for_data_marts: ['claims_enrollment', 'encounters', 'semantic_layer', 'service_categories']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_financial_pmpm
          - the_tuva_project.expect_column_values_to_be_between:
              description: This is a test on all dates to see if they are within a reasonable range.
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                meta:
                  dqi_test_description: 'This is a test on all dates to see if they are within a reasonable range. '
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_financial_pmpm
              arguments:
                min_value: '''1900-01-02'''
                max_value: '''2050-01-02'''
