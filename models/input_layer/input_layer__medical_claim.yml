                tags:
                  - tuva_dqi_sev_5
                  - dqi
        config:
          meta:
            data_type: varchar
      - name: facility_npi
        description: >-
          NPI for the facility where services were delivered. This is especially important for institutional claims and encounter grouping. NPIs should be 10-digit identifiers.
        required_for_data_marts: ['ahrq_measures', 'ed_classification', 'encounters', 'readmissions', 'semantic_layer', 'service_categories']
        tests:
          - not_null:
              description: >
                The encounter grouper depends on this field and will not work as intended if this is not provided. If you have an NPI field and are unsure if the NPI is a facility NPI (i.e. level 2 org NPI), then  join to terminology.provider and filter to level 2 NPIs only.

                If left as null, then encounters will under-merge since encounter merging depends on the facility NPI field.  There are two primary options if facility NPIs (i.e. level 2 NPIs) are not available: - Leave null: This mean claims will not merge based on encounter grouping logic since all claims are assumed to be in different facilities. - Add a blank string: This will over-merge, but will apply encounter grouping logic and assumes all encounters are at the same facility.
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                where: "claim_type = 'institutional' and substring(bill_type_code, 1, 2) in ('11', '12', '15', '16', '17', '18', '21', '22', '25', '26', '27', '28', '31', '41', '42', '45', '46', '47', '48', '61', '62', '65', '66', '67', '68', '82')"
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_readmission
          - the_tuva_project.expect_column_value_lengths_to_equal:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_readmission
              arguments:
                value: 10
          - the_tuva_project.expect_column_values_to_match_regex:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
              arguments:
                regex: ^[0-9]{10}$
                pattern1: '[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]'
        config:
          meta:
            data_type: varchar
