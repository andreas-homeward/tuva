                  - dqi
                  - dqi_financial_pmpm
        config:
          meta:
            data_type: date
      - name: claim_line_end_date
        description: >-
          End date for the service or item represented by the claim line, formatted as YYYY-MM-DD. This may differ across lines within the same claim and should be greater than or equal to claim_line_start_date.
        required_for_data_marts: ['encounters', 'semantic_layer', 'service_categories']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_financial_pmpm
          - the_tuva_project.expect_column_values_to_be_of_type:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_financial_pmpm
              arguments:
                column_type: date
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_5
                  - dqi
                  - dqi_financial_pmpm
          - not_null:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_financial_pmpm
        config:
          meta:
            data_type: date
      - name: admission_date
        description: >-
          Header-level admission date for an inpatient institutional claim, formatted as YYYY-MM-DD. Populate when the claim represents an inpatient facility stay. This value should be consistent across all lines for the same inpatient institutional claim.
        required_for_data_marts: ['claims_enrollment', 'encounters', 'semantic_layer', 'service_categories']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_tuva_chronic_conditions
          - the_tuva_project.expect_column_values_to_be_between:
              description: This is a test on all dates to see if they are within a reasonable range.
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                meta:
                  dqi_test_description: 'This is a test on all dates to see if they are within a reasonable range. '
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_tuva_chronic_conditions
              arguments:
                min_value: '''1900-01-02'''
                max_value: '''2050-01-02'''
                strictly: false
          - the_tuva_project.expect_column_values_to_be_of_type:
              config:
                severity: warn
