                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_ccsr
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_readmission
          - the_tuva_project.expect_column_values_to_match_regex_list:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_ccsr
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_readmission
              arguments:
                regex_list:
                  - ^[A-Z][0-9A-Z]{2,7}$
                  - ^[A-Z][0-9]{1,2}[.][0-9A-Z]{1,7}$
                  - ^[0-9]{3}([.][0-9]{1,2})?$
                  - ^[0-9]{3,5}$
                  - ^[VE][0-9]{3}([.][0-9]{1})?$
                  - ^[VE][0-9]{2,4}$
                match_on: any
                row_condition: diagnosis_code_1 is not null
