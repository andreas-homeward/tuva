      - name: diagnosis_code_1
        description: >-
          Primary or first-listed ICD diagnosis code on the claim. For institutional claims, this should generally be the principal diagnosis. This is header-level information and should be consistent across all lines for the same claim_id.
        required_for_data_marts: ['ccsr', 'cms_chronic_conditions', 'cms_hccs', 'encounters', 'service_categories', 'tuva_chronic_conditions']
        tests:
