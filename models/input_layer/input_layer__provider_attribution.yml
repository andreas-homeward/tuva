                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_financial_pmpm
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: plan
        description: Name of the insurance plan or product associated with the attribution assignment.
        required_for_data_marts: ['cms_hccs', 'financial_pmpm', 'semantic_layer']
