  - name: core__patient
    description: >-
      This model builds the core patient table from the input layer patient and
      eligibility tables. When the clinical input layer is enabled, it pulls
      patient records from the deduplicated patient table derived from
      input_layer__patient. When claims is enabled, it pulls eligibility-derived
      patient records from the deduplicated eligibility table derived from
      input_layer__eligibility. When both clinical and claims are enabled, it
      unions the two sources together and applies an additional deduplication
      step that gives eligibility-derived records precedence over clinical
      patient records. The model also calculates age and age_group from
      birth_date and tuva_last_run, then pulls through extension columns and
      final metadata columns. The table is intended to have one record per
      unique person within each data source. Primary key: person_id,
      data_source.
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_core
        {% else %}core{%- endif -%}
      alias: patient
      meta:
        dag:
          node_type: output
      tags: core
      materialized: table
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - person_id
              - data_source
          config:
            severity: error
    columns:
      - name: person_id
        description: Globally unique identifier for the person across the dataset. This
          should remain stable even when the person has multiple patient IDs,
          member IDs, or medical record numbers.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: sex
        description: Biological sex of the patient. Expected values are male, female, or
          unknown.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/gender
            data_type: varchar
      - name: race
        description: Patient race, mapped to Tuva race terminology when available.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/race
            data_type: varchar
      - name: birth_date
        description: Patient date of birth.
        config:
          meta:
            data_type: date
      - name: death_date
        description: Patient date of death, when available.
        config:
          meta:
            data_type: date
      - name: death_flag
        description: Indicator that the patient is deceased. Expected values are 1 for
          deceased, 0 for not known deceased, or null when unknown.
        data_type: integer
        config:
          meta:
            data_type: number
      - name: name_suffix
        description: Patient name suffix, such as Jr., Sr., or III.
        config:
          meta:
            data_type: varchar
      - name: first_name
        description: Patient first name.
        config:
          meta:
            data_type: varchar
      - name: middle_name
        description: Patient middle name.
        config:
          meta:
            data_type: varchar
      - name: last_name
        description: Patient last name.
        config:
          meta:
            data_type: varchar
      - name: social_security_number
        description: Patient Social Security number as a string in XXX-XX-XXXX format,
          including dashes, when available and permitted.
        config:
          meta:
            data_type: varchar
      - name: address
        description: Street address where the patient lives.
        config:
          meta:
            data_type: varchar
      - name: city
        description: City where the patient lives.
        config:
          meta:
            data_type: varchar
      - name: state
        description: State where the patient lives.
        config:
          meta:
            data_type: varchar
      - name: zip_code
        description: ZIP code where the patient lives.
        config:
          meta:
            data_type: varchar
      - name: county
        description: County where the patient lives.
        config:
          meta:
            data_type: varchar
      - name: latitude
        description: Decimal-degree latitude for the patient's address, when available.
        config:
          meta:
            data_type: float
      - name: longitude
        description: Decimal-degree longitude for the patient's address, when available.
        config:
          meta:
            data_type: float
      - name: phone
        description: Patient phone number as represented in the source system.
        config:
          meta:
            data_type: varchar
      - name: email
        description: Patient email address as represented in the source system.
        config:
          meta:
            data_type: varchar
      - name: ethnicity
        description: Patient ethnicity, mapped to Tuva ethnicity terminology when available.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/ethnicity
            data_type: varchar
      - name: age
        description: Patient age calculated from birth_date and tuva_last_run.
        config:
          meta:
            data_type: number
      - name: age_group
        description: Decade age group derived from age.
        config:
          meta:
            data_type: varchar
      - name: tuva_last_run
        description: The last time the data was refreshed. Generated by
          `dbt_utils.pretty_time` as the local time of the `dbt run`
          environment. Timezone is configurable via the `tuva_last_run` var.
        config:
          meta:
            data_type: timestamp
      - name: data_source
        description: User-defined name that identifies the source of the patient record,
          for example a claims payer data source or a clinical system such as
          Epic, Athena Health, or Cerner.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
            is_primary_key: true
  - name: core__person_id_crosswalk
    description: |-
      The person ID crosswalk table stores source identifiers associated with each person across claims and clinical data. Claims-derived rows use member_id, payer, plan, and data_source from eligibility. Clinical rows use patient_id and data_source from the clinical patient input layer.

      This table is useful for tracing the globally unique person_id back to source-system identifiers such as member IDs and medical record numbers.

      Primary key: person_id, patient_id, member_id, payer, plan, data_source.
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_core
        {% else %}core{%- endif -%}
      alias: person_id_crosswalk
      tags: core
      materialized: table
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - person_id
              - patient_id
              - member_id
              - payer
              - '{{ quote_column("plan") }}'
              - data_source
    columns:
      - name: person_id
        description: Globally unique identifier for the person across the dataset.
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: patient_id
        description: Identifier that links the person to a particular clinical source
          system, for example a medical record number or MRN. Populated for
          clinical source rows.
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: member_id
        description: Identifier assigned by the payer or health plan for the person's
          coverage. Populated for claims eligibility source rows.
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: payer
        description: Name of the payer associated with the member_id, when the source
          row comes from eligibility.
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: plan
        description: Name of the health insurance plan or product associated with the
          member_id, when the source row comes from eligibility.
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: tuva_last_run
        description: The last time the data was refreshed. Generated by
          `dbt_utils.pretty_time` as the local time of the `dbt run`
          environment. Timezone is configurable via the `tuva_last_run` var.
        config:
          meta:
            data_type: timestamp
      - name: data_source
        description: User-defined name that identifies the source system or dataset for
          the source identifier.
        config:
          meta:
            data_type: varchar
            is_primary_key: true
  - name: core__pharmacy_claim
    description: |-
      The pharmacy claim table stores final adjudicated pharmacy claim lines for prescription medications dispensed by a pharmacy, submitted for payment, and adjudicated by a payer. Prescriptions that were ordered but not filled should not appear in this table.

      This model pulls from claims preprocessing, enriches pharmacy claim lines with NDC descriptions and enrollment matching, and passes through pharmacy claim extension columns and file metadata. Most pharmacy claims have one line, but claim_line_number is included to support sources that represent a single pharmacy claim with multiple lines and to keep the grain consistent with medical_claim.

      Table grain: One record per pharmacy claim line per data source.

      Primary key: pharmacy_claim_id.
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_core
        {% else %}core{%- endif -%}
      alias: pharmacy_claim
      tags: core
      materialized: table
    columns:
      - name: pharmacy_claim_id
        description: Synthetic primary key for each pharmacy claim line, created from
          claim_id, claim_line_number, and data_source.
        tests:
          - unique
          - not_null
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: claim_id
        description: Identifier for a pharmacy claim. Most pharmacy claims have one
          claim line, but the same claim_id may appear on multiple rows when a
          source represents a single claim with multiple lines.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
      - name: claim_line_number
        description: Line number for the pharmacy claim line represented by the row.
          Values should be positive integers and should uniquely identify each
          line within a claim_id.
        tests:
          - not_null
        data_type: integer
        config:
          meta:
            data_type: number
      - name: person_id
        description: Globally unique identifier for the person who received the
          dispensed medication.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
      - name: member_id
        description: Identifier assigned by the payer or health plan for the person's
          coverage. This should identify the member associated with the pharmacy
          claim.
        config:
          meta:
            data_type: varchar
      - name: payer
        description: Name of the payer responsible for the pharmacy claim, for example
          Aetna, Blue Cross Blue Shield, or Medicare Part D.
        config:
          meta:
            data_type: varchar
      - name: plan
        description: Name of the health insurance plan or product associated with the
          pharmacy claim.
        config:
          meta:
            data_type: varchar
      - name: prescribing_provider_id
        description: Identifier for the provider who prescribed the medication. For
          claims-derived pharmacy records, this is generally the prescribing
          provider NPI.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/provider
            terminology_note: '**Note: this terminology set is too large to be loaded as a
              seed and is instead loaded from public cloud storage for supported
              adapters.'
            data_type: varchar
      - name: prescribing_provider_name
        description: Name of the provider who prescribed the medication, derived from
          provider terminology when available.
        config:
          meta:
            data_type: varchar
      - name: dispensing_provider_id
        description: Identifier for the provider or pharmacy that dispensed the
          medication. This often identifies the dispensing pharmacy organization
          rather than an individual pharmacist.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/provider
            terminology_note: '**Note: this terminology set is too large to be loaded as a
              seed and is instead loaded from public cloud storage for supported
              adapters.'
            data_type: varchar
      - name: dispensing_provider_name
        description: Name of the provider or pharmacy that dispensed the medication,
          derived from provider terminology when available.
        config:
          meta:
            data_type: varchar
      - name: dispensing_date
        description: Date the medication was dispensed to the patient. This may be
          called fill date in source data.
        config:
          meta:
            data_type: date
      - name: ndc_code
        description: National Drug Code for the medication dispensed on the pharmacy
          claim line.
        config:
          meta:
            terminology: https://www.fda.gov/drugs/drug-approvals-and-databases/national-drug-code-directory
            data_type: varchar
      - name: ndc_description
        description: Description of ndc_code, derived from Tuva NDC terminology when
          available.
        config:
          meta:
            data_type: varchar
      - name: quantity
        description: Quantity of the medication dispensed on the pharmacy claim line.
        data_type: integer
        config:
          meta:
            data_type: number
      - name: days_supply
        description: Number of days the dispensed medication is expected to last.
        data_type: integer
        config:
          meta:
            data_type: number
      - name: refills
        description: Refill number or refill count associated with the dispensed
          prescription, as represented by the source.
        data_type: integer
        config:
          meta:
            data_type: number
      - name: paid_date
        description: Date the pharmacy claim was paid or processed for payment by the payer.
        config:
          meta:
            data_type: date
      - name: paid_amount
        description: Amount paid by the payer for the pharmacy claim line after
          adjustment, denial, reversal, and replacement logic has been applied.
        config:
          meta:
            data_type: number
      - name: allowed_amount
        description: Total allowed amount for the pharmacy claim line, including
          payer-paid and patient-responsibility amounts when those fields are
          available.
        config:
          meta:
            data_type: number
      - name: charge_amount
        description: Amount charged or billed by the pharmacy for the medication before
          payer adjudication, discounts, or payment adjustments.
        config:
          meta:
            data_type: number
      - name: coinsurance_amount
        description: Coinsurance amount owed by the member for the pharmacy claim line.
        config:
          meta:
            data_type: number
      - name: copayment_amount
        description: Copayment amount owed by the member for the pharmacy claim line.
        config:
          meta:
            data_type: number
      - name: deductible_amount
        description: Deductible amount owed by the member for the pharmacy claim line
          before other coverage or cost sharing is applied.
        config:
          meta:
            data_type: number
      - name: in_network_flag
        description: Indicator for whether the pharmacy claim was in network. Accepted
          values are 1 for in network, 0 for out of network, and null when
          unknown.
        config:
          meta:
            data_type: number
      - name: enrollment_flag
        description: Indicator for whether the pharmacy claim line has corresponding
          eligibility during the same period when the medication was dispensed.
        config:
          meta:
            data_type: number
      - name: member_month_key
        description: Synthetic key for the member month associated with the pharmacy
          claim line when matching eligibility is available.
        config:
          meta:
            data_type: number
      - name: file_date
        description: Date associated with the source file. This may represent the
          delivery date, reporting period, or date embedded in the file name.
        config:
          meta:
            data_type: timestamp
      - name: ingest_datetime
        description: Date and time the source pharmacy claim line or file was loaded
          into the data warehouse. This is useful when multiple versions of the
          same claim line are received over time.
        config:
          meta:
            data_type: timestamp
      - name: file_name
        description: Name of the source file from which the pharmacy claim line
          originated. This field is useful for tracing source records across
          file-based claims extracts.
        config:
          meta:
            data_type: varchar
      - name: tuva_last_run
        description: The last time the data was refreshed. Generated by
          `dbt_utils.pretty_time` as the local time of the `dbt run`
          environment. Timezone is configurable via the `tuva_last_run` var.
        config:
          meta:
            data_type: varchar
      - name: data_source
        description: User-defined name that identifies the source of the pharmacy claim
          data, for example BCBS Tennessee, Medicare Part D, or Medicaid Ohio.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
  - name: core__practitioner
    description: |-
      The practitioner table stores provider records from clinical and claims sources, including source-system practitioner identifiers, NPIs when available, provider names, practice affiliation, specialty, and sub-specialty.

      When clinical data is enabled, this table pulls practitioner records from input_layer__practitioner. When claims data is enabled, Tuva derives practitioner records from provider identifiers that appear on medical and pharmacy claims. Clinical practitioner records should use practitioner_id to preserve the source-system provider identifier; claims-derived records generally use provider identifiers from claims and provider terminology.

      Primary key: practitioner_id.
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_core
        {% else %}core{%- endif -%}
      alias: practitioner
      tags: core
      materialized: table
    columns:
      - name: practitioner_id
        description: Identifier for the practitioner within a data source. For clinical
          rows, this is the source-system practitioner identifier used by other
          clinical tables. For claims-derived rows, this is generally derived
          from the provider identifier on the claim.
        tests:
          - unique:
              config:
                severity: warn
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: npi
        description: The practitioner's 10-digit National Provider Identifier, when
          available. For clinical practitioner rows, this should generally be an
          individual practitioner NPI rather than a facility or organization
          NPI.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/provider
            terminology_note: '**Note: this terminology set is too large to be loaded as a
              seed and is instead loaded from public cloud storage for supported
              adapters.'
            data_type: varchar
      - name: first_name
        description: First name of the practitioner as represented in the source system
          or provider terminology.
        config:
          meta:
            data_type: varchar
      - name: last_name
        description: Last name of the practitioner as represented in the source system
          or provider terminology.
        config:
          meta:
            data_type: varchar
      - name: practice_affiliation
        description: Practice, group, department, clinic, or organization with which the
          practitioner is affiliated, when available.
        config:
          meta:
            data_type: varchar
      - name: specialty
        description: Primary clinical specialty for the practitioner, such as family
          medicine, cardiology, or emergency medicine.
        config:
          meta:
            data_type: varchar
      - name: sub_specialty
        description: More specific specialty or subspecialty for the practitioner, when
          available.
        config:
          meta:
            data_type: varchar
      - name: tuva_last_run
        description: The last time the data was refreshed. Generated by
          `dbt_utils.pretty_time` as the local time of the `dbt run`
          environment. Timezone is configurable via the `tuva_last_run` var.
        config:
          meta:
            data_type: timestamp
      - name: data_source
        description: User-defined name that identifies the source of the practitioner
          data, for example a claims payer data source or a clinical system such
          as Epic, Athena Health, or Cerner.
        config:
          meta:
            data_type: varchar
  - name: core__procedure
    description: |-
      The procedure table stores procedures performed for patients from claims and clinical sources. Claims-derived rows come from procedure codes on medical claims. Clinical rows come from input_layer__procedure.

      Tuva normalizes supported source procedure code systems in this model by joining source_code_type and source_code to terminology tables, or to custom mappings when the normalization engine is enabled. Procedure modifiers are retained when available. Clinical extension columns are pulled through when clinical data is enabled.

      Primary key: procedure_id, data_source.
    tests:
      - dbt_utils.unique_combination_of_columns:
          config:
            severity: warn
          arguments:
            combination_of_columns:
              - procedure_id
              - data_source
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_core
        {% else %}core{%- endif -%}
      alias: procedure
      tags: core
      materialized: table
    columns:
      - name: procedure_id
        description: Identifier for a procedure record within a data source. For
          claims-derived rows, Tuva creates this value from claim and procedure
          attributes. For clinical rows, this value is passed through from
          input_layer__procedure.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: encounter_id
        description: Identifier for the encounter associated with the procedure, when
          available.
        config:
          meta:
            data_type: varchar
      - name: claim_id
        description: Identifier for the medical claim associated with the procedure.
          This field is populated for claims-derived procedure rows and null for
          clinical procedure rows.
        config:
          meta:
            data_type: varchar
      - name: person_id
        description: Globally unique identifier for the person associated with the
          procedure.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
      - name: member_id
        description: Identifier assigned by the payer or health plan for the person's
          coverage. Populated for claims-derived procedure rows and null for
          clinical procedure rows when no member identifier is available.
        config:
          meta:
            data_type: varchar
      - name: patient_id
        description: Clinical source-system patient identifier, such as medical record
          number or MRN. Populated for clinical procedure rows when available.
        config:
          meta:
            data_type: varchar
      - name: procedure_date
        description: Date the procedure was performed or documented.
        config:
          meta:
            data_type: varchar
      - name: source_code_type
        description: Source procedure code system. Expected values include snomed-ct,
          hcpcs, icd-10-pcs, and icd-9-pcs.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/code-type
            data_type: varchar
      - name: source_code
        description: Procedure code from the source system before Tuva normalization.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/icd-10-pcs
            terminology_note: '**Note: this terminology set is too large to be loaded as a
              seed and is instead loaded from public cloud storage for supported
              adapters.'
            data_type: varchar
      - name: source_description
        description: Source-system description of the procedure code, when available.
        config:
          meta:
            data_type: varchar
      - name: normalized_code_type
        description: Normalized procedure code system derived from Tuva terminology or
          custom mapping logic.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/code-type
            data_type: varchar
      - name: normalized_code
        description: Normalized procedure code derived from Tuva terminology or custom
          mapping logic.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/icd-10-pcs
            terminology_note: '**Note: this terminology set is too large to be loaded as a
              seed and is instead loaded from public cloud storage for supported
              adapters.'
            data_type: varchar
      - name: normalized_description
        description: Human-readable description for normalized_code, derived from Tuva
          terminology or custom mapping logic.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/hcpcs-level-2
            data_type: varchar
      - name: mapping_method
        description: Method used to populate normalized_code_type, normalized_code, and
          normalized_description. Automatic means Tuva matched the source code
          to terminology. Custom means the normalization engine supplied the
          mapping. Manual means normalized fields were already populated in
          upstream staged procedure data.
        config:
          meta:
            data_type: varchar
      - name: modifier_1
        description: First modifier for the procedure code.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/hcpcs-level-2
            data_type: varchar
      - name: modifier_2
        description: Second modifier for the procedure code.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/hcpcs-level-2
            data_type: varchar
      - name: modifier_3
        description: Third modifier for the procedure code.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/hcpcs-level-2
            data_type: varchar
      - name: modifier_4
        description: Fourth modifier for the procedure code.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/hcpcs-level-2
            data_type: varchar
      - name: modifier_5
        description: Fifth modifier for the procedure code.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/hcpcs-level-2
            data_type: varchar
      - name: practitioner_id
        description: Source-system practitioner identifier for the clinician associated
          with the procedure, when available.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/provider
            terminology_note: '**Note: this terminology set is too large to be loaded as a
              seed and is instead loaded from public cloud storage for supported
              adapters.'
            data_type: varchar
      - name: tuva_last_run
        description: The last time the data was refreshed. Generated by
          `dbt_utils.pretty_time` as the local time of the `dbt run`
          environment. Timezone is configurable via the `tuva_last_run` var.
        config:
          meta:
            data_type: timestamp
      - name: data_source
        description: User-defined name that identifies the source of the procedure data,
          for example a claims payer data source or a clinical system such as
          Epic, Athena Health, or Cerner.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
            is_primary_key: true
