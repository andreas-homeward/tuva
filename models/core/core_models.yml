  - name: core__int_member_months
    description: |-
      This model creates member-month records from normalized eligibility spans. It joins normalized eligibility records to the calendar reference table so that each eligibility span is expanded into one record for each covered year-month. It then creates member_month_key as a synthetic key from person_id, member_id, year_month, payer, plan, and data_source, and pulls through eligibility extension columns.

      Table grain: One record per person, member, year month, payer, plan, and data source.
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_core
        {% else %}core{%- endif -%}
      alias: _int_member_months
      meta:
        dag:
          node_type: intermediate
      tags:
        - core
        - core_stage_claims
      materialized: table
    columns:
      - name: member_month_key
        description: Synthetic key created from person_id, member_id, year_month, payer,
          plan, and data_source.
        tests:
          - unique
        config:
          meta:
            is_primary_key: true
            data_type: varchar
      - name: person_id
        description: Unique identifier for each person in the dataset.
        config:
          meta:
            data_type: varchar
      - name: member_id
        description: Identifier assigned by the payer or health plan for the covered member.
        config:
          meta:
            data_type: varchar
      - name: year_month
        description: Year and month of eligibility in YYYYMM format.
        config:
          meta:
            data_type: varchar
      - name: payer
        description: Name of the payer or health insurer providing coverage during the
          member month.
        config:
          meta:
            data_type: varchar
      - name: plan
        description: Name of the health plan providing coverage during the member month.
        config:
          meta:
            data_type: varchar
      - name: tuva_last_run
        description: The last time the data was refreshed. Generated by
          `dbt_utils.pretty_time` as the local time of the `dbt run`
          environment. Timezone is configurable via the `tuva_last_run` var.
        config:
          meta:
            data_type: timestamp
      - name: data_source
        description: User-configured field that indicates the data source.
        config:
          meta:
            data_type: varchar
  - name: core__stg_provider_attribution
