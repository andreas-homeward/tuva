version: 2
models:
  - name: core__appointment
    description: |-
      The appointment table stores scheduling information for clinical appointments, including scheduled, completed, canceled, and no-show appointments when those records are available from the source system. Appointments may be linked to an encounter when the appointment resulted in a clinical visit, but not every appointment will have an encounter_id.

      This model transforms the input layer by:
      1. Casting every appointment field to its core data type
      2. Left joining appointment type, appointment status, and appointment cancellation reason terminology tables to populate the _norm columns
      3. Pulling through extension columns from input_layer__appointment

      Table grain: One record per appointment per patient per data source.

      Primary key: appointment_id, data_source.
    tests:
      - dbt_utils.unique_combination_of_columns:
          config:
            severity: warn
          arguments:
            combination_of_columns:
              - appointment_id
              - data_source
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_core
        {% else %}core{%- endif -%}
      alias: appointment
      meta:
        dag:
          node_type: output
      tags: core
      materialized: table
    columns:
      - name: appointment_id
        description: Identifier for an appointment within a data source. This value
          should identify the appointment when combined with data_source.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: person_id
        description: Globally unique identifier for the person associated with the
          appointment. A person may have multiple patient IDs over time or
          across clinical source systems, but person_id should remain stable for
          the same person.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
      - name: patient_id
        description: Identifier that links the person to a particular clinical source
          system, for example a medical record number or MRN. A single person
          may have multiple patient IDs.
        config:
          meta:
            data_type: varchar
      - name: encounter_id
        description: Identifier for the clinical encounter associated with the
          appointment. Populated when the appointment resulted in, or is linked
          to, a clinical encounter.
        config:
          meta:
            data_type: varchar
      - name: start_datetime
        description: Scheduled start date and time of the appointment. This should
          include both date and time when available.
        config:
          meta:
            data_type: timestamp
      - name: end_datetime
        description: Scheduled end date and time of the appointment. This should be
          greater than or equal to start_datetime when both values are
          populated.
        config:
          meta:
            data_type: timestamp
      - name: duration
        description: Scheduled duration of the appointment in minutes. This may be
          supplied by the source or derived from start_datetime and
          end_datetime.
        config:
          meta:
            data_type: number
      - name: location_id
        description: Identifier for the location where the appointment is scheduled,
          such as a clinic, department, facility, or site in the source system.
        config:
          meta:
            data_type: varchar
      - name: practitioner_id
        description: Identifier for the practitioner associated with the appointment.
          When multiple practitioners are associated with an appointment, this
          generally represents the primary, scheduled, or rendering practitioner
          from the source system.
        config:
          meta:
            data_type: varchar
      - name: type_code
        description: Source appointment type code. This field preserves the appointment
          type value from the source system and is used to normalize appointment
          type.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/appointment-type
            data_type: varchar
      - name: type_description
        description: Human-readable description of the source appointment type.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/appointment-type
            data_type: varchar
      - name: type_code_norm
        description: Normalized appointment type code derived downstream from the source
          appointment type.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/appointment-type
            data_type: varchar
      - name: type_description_norm
        description: Normalized appointment type description derived downstream from the
          source appointment type.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/appointment-type
            data_type: varchar
      - name: status_code
        description: Source appointment status code, such as scheduled, completed,
          canceled, or no-show. This field is used to normalize appointment
          status.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/appointment-status
            data_type: varchar
      - name: status_description
        description: Human-readable description of the source appointment status.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/appointment-status
            data_type: varchar
      - name: status_code_norm
        description: Normalized status code derived downstream from the source status.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/appointment-status
            data_type: varchar
      - name: status_description_norm
        description: Normalized appointment status description derived downstream from
          the source status.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/appointment-status
            data_type: varchar
      - name: reason
        description: Free-text reason for the appointment. This may represent the
          patient-stated reason, scheduling reason, visit reason, or chief
          complaint depending on the source system.
        config:
          meta:
            data_type: varchar
      - name: cancellation_reason
        description: Source cancellation reason for canceled appointments. Populated
          only when the appointment was canceled and the source provides a
          cancellation reason.
        config:
          meta:
            data_type: varchar
      - name: cancellation_reason_code_norm
        description: Normalized code for the appointment cancellation reason.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/appointment-cancellation-reason
            data_type: varchar
      - name: cancellation_reason_description_norm
        description: Normalized description of the code for the cancellation reason.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/appointment-cancellation-reason
            data_type: varchar
      - name: tuva_last_run
        description: The last time the data was refreshed. Generated by
          `dbt_utils.pretty_time` as the local time of the `dbt run`
          environment. Timezone is configurable via the `tuva_last_run` var.
        config:
          meta:
            data_type: timestamp
      - name: data_source
        description: User-defined name that identifies the source of the appointment
          data, for example Epic, Athena Health, or Cerner.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
            is_primary_key: true
  - name: core__condition
    description: |
      The condition table stores diagnoses, problem list records, encounter diagnoses, admitting diagnoses, discharge diagnoses, and other condition records from claims and clinical sources. Claims-derived rows come from diagnosis codes on medical claims. Clinical rows come from input_layer__condition.

      Tuva normalizes supported source condition code systems in this model by joining source_code_type and source_code to terminology tables, or to custom mappings when the normalization engine is enabled. Present-on-admission descriptions are derived from present_on_admit_code using Tuva terminology.

      Primary key: condition_id, data_source.
    tests:
      - dbt_utils.unique_combination_of_columns:
          config:
            severity: warn
          arguments:
            combination_of_columns:
              - condition_id
              - data_source
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_core
        {% else %}core{%- endif -%}
      alias: condition
      tags: core
      materialized: table
    columns:
      - name: condition_id
        description: Unique identifier for each condition record. For claims-derived
          rows, Tuva creates this value from payer, data_source, claim_id,
          diagnosis rank, source_code_type, and source_code. For clinical rows,
          this value is passed through from input_layer__condition.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: payer
        description: Name of the payer or health insurer for claims-derived condition
          rows. This field is null for clinical condition rows sourced from
          input_layer__condition.
        config:
          meta:
            data_type: varchar
      - name: person_id
        description: Globally unique identifier for the person associated with the
          condition. A person may have multiple patient IDs or member IDs over
          time or across source systems, but person_id should remain stable for
          the same person.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
      - name: member_id
        description: Identifier assigned by the payer or health plan for the person's
          coverage. Populated for claims-derived condition rows and null for
          clinical condition rows when no member identifier is available.
        config:
          meta:
            data_type: varchar
      - name: patient_id
        description: Identifier that links the person to a particular clinical source
          system, for example a medical record number or MRN. Populated for
          clinical condition rows when available.
        config:
          meta:
            data_type: varchar
      - name: encounter_id
        description: Identifier for the encounter associated with the condition.
          Populated when the condition was documented during, or is linked to,
          an encounter.
        config:
          meta:
            data_type: varchar
      - name: claim_id
        description: Unique identifier for the medical claim associated with the
          condition. This field is populated for claims-derived condition rows
          sourced from medical claims and is null for clinical condition rows
          sourced from input_layer__condition.
        config:
          meta:
            data_type: varchar
      - name: recorded_date
        description: Date the condition was recorded or documented in the source system.
        config:
          meta:
            data_type: date
      - name: onset_date
        description: Date the condition began or was first clinically present, when
          available.
        config:
          meta:
            data_type: date
      - name: resolved_date
        description: Date the condition resolved or became inactive, when available.
        config:
          meta:
            data_type: date
      - name: status
        description: Status of the condition record, such as active, resolved, inactive,
          historical, suspected, or entered-in-error.
        config:
          meta:
            data_type: varchar
      - name: condition_type
        description: Category of condition record, such as problem, encounter diagnosis,
          admitting diagnosis, discharge diagnosis, or billing diagnosis.
        config:
          meta:
            data_type: varchar
      - name: source_code_type
        description: Code system for source_code. Common condition code systems include
          icd-10-cm, icd-9-cm, and snomed-ct.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/code-type
            data_type: varchar
      - name: source_code
        description: Condition code from the source system before Tuva normalization.
          For ICD diagnosis codes, the source may include or omit decimal
          formatting.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/icd-10-cm
            terminology_note: '**Note: this terminology set is too large to be loaded as a
              seed and is instead loaded from public cloud storage for supported
              adapters.'
            data_type: varchar
      - name: source_description
        description: Human-readable description of the source condition code or
          condition record, when available from the source system.
        config:
          meta:
            data_type: varchar
      - name: normalized_code_type
        description: Normalized code system for the condition code. For clinical rows,
          this is derived in core.condition by matching source_code_type and
          source_code to Tuva terminology, or by using custom mappings when the
          normalization engine is enabled. This field is not expected in
          input_layer__condition.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/code-type
            data_type: varchar
      - name: normalized_code
        description: Normalized condition code after Tuva maps source_code_type and
          source_code to the supported terminology code system. For clinical
          rows, this field is derived in core.condition and is not expected in
          input_layer__condition.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/icd-10-cm
            terminology_note: '**Note: this terminology set is too large to be loaded as a
              seed and is instead loaded from public cloud storage for supported
              adapters.'
            data_type: varchar
      - name: normalized_description
        description: Human-readable description for normalized_code, populated from Tuva
          terminology or custom mappings when a supported mapping is available.
        config:
          meta:
            data_type: varchar
      - name: mapping_method
        description: Method used to populate normalized_code_type, normalized_code, and
          normalized_description. Automatic means Tuva matched the source code
          to a terminology table. Custom means the normalization engine
          populated the normalized fields from a custom mapping. Manual means
          normalized fields were already populated in upstream staged condition
          data.
        config:
          meta:
            data_type: varchar
      - name: condition_rank
        description: The numerical ranking of the condition. For conditions derived from
          medical claims, condition_rank is set from the diagnosis code position
          on the claim, so diagnosis_code_1 becomes condition_rank = 1,
          diagnosis_code_2 becomes condition_rank = 2, and so on through
          diagnosis_code_25. For conditions sourced from the input layer
          condition table, this field is passed through without transformation
          from the mapped input value. A condition_rank of 1 indicates a primary
          diagnosis code, and any condition_rank greater than 1 indicates a
          secondary diagnosis code.
        data_type: integer
        config:
          meta:
            data_type: number
      - name: present_on_admit_code
        description: Present-on-admission indicator for the condition, when applicable.
          This is most relevant for inpatient facility diagnoses.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/present-on-admission
            data_type: varchar
      - name: present_on_admit_description
        description: Description of present_on_admit_code, derived from
          terminology__present_on_admission.
        config:
          meta:
            data_type: varchar
      - name: tuva_last_run
        description: The last time the data was refreshed. Generated by
          `dbt_utils.pretty_time` as the local time of the `dbt run`
          environment. Timezone is configurable via the `tuva_last_run` var.
        config:
          meta:
            data_type: timestamp
      - name: data_source
        description: User-defined name that identifies the source of the condition data,
          for example a claims payer data source or a clinical system such as
          Epic, Athena Health, or Cerner.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
            is_primary_key: true
  - name: core__eligibility
    description: |-
      This table stores health insurance eligibility and enrollment spans. It is designed to contain one record per person per enrollment span, where an enrollment span is the period during which a person is enrolled in a health plan. That period usually begins on enrollment_start_date and ends on enrollment_end_date. A person may have multiple records in this table when they have multiple enrollment spans with different health plans or multiple enrollment spans with the same health plan.

      The primary key is eligibility_id, a synthetic key created upstream in normalized__eligibility. The eligibility_id is made from person_id, member_id, enrollment_start_date, enrollment_end_date, payer, plan, and data_source. This key is created because downstream models, including the semantic layer, need a stable record-level identifier for each eligibility span.

      Each record includes person_id, the globally unique identifier for the person, along with payer, plan, member_id, subscriber_id, enrollment dates, and other health plan enrollment attributes. These attributes include payer type, Medicare entitlement and status fields, dual eligibility status, hospice and institutional enrollment indicators, subscriber relationship, group identifiers, FIPS state fields, source file metadata, and extension columns.

      Primary key: eligibility_id.
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_core
        {% else %}core{%- endif -%}
      alias: eligibility
      tags: core
      materialized: table
    columns:
      - name: eligibility_id
        description: Primary key for the eligibility record. This value is created
          upstream in normalized__eligibility by concatenating person_id,
          member_id, enrollment_start_date, enrollment_end_date, payer, plan,
          and data_source with hyphen delimiters.
        tests:
          - not_null
          - unique
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: person_id
        description: Globally unique identifier for a person across all data sources. A
          person may have multiple member_id or subscriber_id values over time,
          but person_id should remain stable for the same person.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
      - name: member_id
        description: Identifier assigned by the payer or health plan for the person's
          enrollment in a specific insurance product or health plan. A person
          may have more than one member_id when they have more than one
          insurance product, plan, or coverage period.
        config:
          meta:
            data_type: varchar
      - name: subscriber_id
        description: Identifier for the policyholder or primary subscriber through whom
          coverage is obtained. Spouses and dependents may have their own
          person_id and member_id while sharing a subscriber_id.
        config:
          meta:
            data_type: varchar
      - name: subscriber_relation
        description: The person's relationship to the subscriber or policyholder for the
          enrollment span, for example self, spouse, or child.
        config:
          meta:
            data_type: varchar
      - name: enrollment_start_date
        description: Date the person's enrollment span begins.
        config:
          meta:
            data_type: date
      - name: enrollment_end_date
        description: Date the person's enrollment span ends. Open-ended spans are
          commonly represented as 9999-12-31.
        config:
          meta:
            data_type: date
      - name: payer
        description: Name of the payer providing coverage for the enrollment span, for
          example Aetna or Blue Cross Blue Shield.
        config:
          meta:
            data_type: varchar
      - name: payer_type
        description: Line of business for the payer. Values should map to Tuva payer
          type terminology, such as commercial, medicaid, medicare, or
          self-insured.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/payer-type
            data_type: varchar
      - name: plan
        description: Name of the specific health insurance product for the enrollment
          span, for example Aetna PPO or Aetna HMO.
        config:
          meta:
            data_type: varchar
      - name: birth_date
        description: Birth date of the person.
        config:
          meta:
            data_type: date
      - name: death_date
        description: Date the person died, when available.
        config:
          meta:
            data_type: date
      - name: original_reason_entitlement_code
        description: Medicare Original Reason for Entitlement Code, or OREC. This
          single-character code identifies the original reason the person became
          eligible for Medicare and supports CMS-HCC risk adjustment.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/medicare-orec
            data_type: varchar
      - name: dual_status_code
        description: Indicates whether the person is dually eligible for Medicare and
          Medicaid during the enrollment span. This supports CMS-HCC risk
          adjustment.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/medicare-dual-eligibility
            data_type: varchar
      - name: medicare_status_code
        description: Two-character Medicare status code indicating how the person
          currently qualifies for Medicare. This is used in CMS-HCC risk
          adjustment when original_reason_entitlement_code is not available.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/medicare-status
            data_type: varchar
      - name: enrollment_status
        description: Enrollment status used to determine CMS-HCC risk score
          coefficients. Leave null when unknown so Tuva can infer enrollment
          status from other available eligibility fields.
        config:
          meta:
            data_type: varchar
      - name: hospice_flag
        description: Indicator for whether the person is enrolled in hospice during the
          enrollment span. Accepted values are 0 and 1.
        config:
          meta:
            data_type: integer
      - name: institutional_snp_flag
        description: Indicator for whether the person is enrolled in an institutional
          Special Needs Plan and requires a nursing-home level of care. Accepted
          values are 0 and 1.
        config:
          meta:
            data_type: integer
      - name: medicaid_indicator
        description: Indicator for whether the person has Medicaid coverage during the
          enrollment span. Accepted values are 0 and 1.
        config:
          meta:
            data_type: integer
      - name: long_term_institutional_flag
        description: Indicator for whether the person has been in an institutional
          setting for more than 30 days. Accepted values are 0 and 1.
        config:
          meta:
            data_type: integer
      - name: part_d_raf_type
        description: Medicare Part D risk adjustment factor type for the enrollment
          span. Null when the record is not related to Part D coverage.
        config:
          meta:
            data_type: varchar
      - name: low_income_subsidy_indicator
        description: Indicator for Low Income Subsidy, also known as Extra Help, during
          the enrollment span. Null when not applicable.
        config:
          meta:
            data_type: integer
      - name: metal_level
        description: ACA exchange metal tier for the health plan, if applicable. Null
          when the enrollment span is not related to ACA exchange coverage.
        config:
          meta:
            data_type: varchar
      - name: csr_indicator
        description: Cost Sharing Reduction, or CSR, variant indicator for ACA exchange
          coverage. Null when not applicable.
        config:
          meta:
            data_type: integer
      - name: enrollment_duration_months
        description: Number of months covered during the benefit year for ACA exchange
          enrollment. Null when not applicable.
        config:
          meta:
            data_type: integer
      - name: esrd_status
        description: Indicator for end-stage renal disease status. Most commonly
          available with Medicare eligibility. Null when not applicable.
        config:
          meta:
            data_type: integer
      - name: transplant_duration_months
        description: Number of months since kidney transplant, if applicable. Most
          commonly available with Medicare eligibility data.
        config:
          meta:
            data_type: integer
      - name: group_id
        description: Identifier for the employer group or plan group associated with the
          enrollment span. Null when not applicable.
        config:
          meta:
            data_type: varchar
      - name: group_name
        description: Name of the employer group or plan group associated with group_id.
          Null when not applicable.
        config:
          meta:
            data_type: varchar
      - name: fips_state_name
        description: ANSI/FIPS state name matched from the source state value in
          normalized eligibility.
        config:
          meta:
            data_type: varchar
      - name: fips_state_code
        description: ANSI/FIPS state code matched from the source state value in
          normalized eligibility.
        config:
          meta:
            data_type: varchar
      - name: fips_state_abbreviation
        description: ANSI/FIPS state abbreviation matched from the source state value in
          normalized eligibility.
        config:
          meta:
            data_type: varchar
      - name: file_date
        description: Date the source file identified by file_name was delivered.
        config:
          meta:
            data_type: timestamp
      - name: ingest_datetime
        description: Date and time the source eligibility record or file was loaded into
          the data warehouse. This is useful when multiple versions of the same
          source record are received over time.
        config:
          meta:
            data_type: timestamp
      - name: file_name
        description: Name of the source file from which the eligibility record
          originated. This field is useful for tracing source records across
          file-based eligibility extracts.
        config:
          meta:
            data_type: varchar
      - name: tuva_last_run
        description: The last time the data was refreshed. Generated by
          `dbt_utils.pretty_time` as the local time of the `dbt run`
          environment. Timezone is configurable via the `tuva_last_run` var.
        config:
          meta:
            data_type: timestamp
      - name: data_source
        description: User-defined name that identifies the source of the eligibility
          data, for example BCBS Tennessee, Medicare FFS, or Medicaid Ohio.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
  - name: core__encounter
    description: |-
      The encounter table stores patient visits from claims and clinical sources, including acute inpatient stays, emergency department visits, office visits, skilled nursing facility stays, and other encounters. Claims-derived encounters are created from medical claims and claims preprocessing logic. Clinical encounters are pulled from input_layer__encounter when clinical data is enabled.

      This model standardizes encounter fields from claims and clinical sources, calculates length_of_stay from encounter_start_date and encounter_end_date, enriches admit source, admit type, discharge disposition, primary diagnosis, and DRG descriptions from Tuva terminology, and pulls through clinical extension columns when clinical data is enabled.

      Primary key: encounter_id, data_source.
    tests:
      - dbt_utils.unique_combination_of_columns:
          config:
            severity: warn
          arguments:
            combination_of_columns:
              - encounter_id
              - data_source
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_core
        {% else %}core{%- endif -%}
      alias: encounter
      tags:
        - core
        - encounters
      materialized: table
    columns:
      - name: _dbt_source_relation
        description: dbt utils metadata column to indicate the source table from
          unioning tables together.
        config:
          meta:
            data_type: varchar
      - name: encounter_id
        description: Identifier for an encounter within a data source.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: person_id
        description: Globally unique identifier for the person associated with the
          encounter.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
      - name: patient_data_source_id
        description: Identifier for the source system from which the patient or
          encounter source identifier originated.
        config:
          meta:
            data_type: varchar
      - name: encounter_type
        description: Type of encounter, such as acute inpatient, emergency department,
          outpatient, office visit, or skilled nursing facility. Values should
          map to Tuva encounter type terminology.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/encounter-type
            data_type: varchar
      - name: encounter_group
        description: Higher-level grouping of encounter_type used for utilization and
          reporting.
        config:
          meta:
            data_type: varchar
      - name: encounter_start_date
        description: Date the encounter started. For inpatient and multi-day encounters,
          this is the admission or first service date.
        config:
          meta:
            data_type: date
      - name: encounter_end_date
        description: Date the encounter ended. For inpatient and multi-day encounters,
          this is the discharge or last service date.
        config:
          meta:
            data_type: date
      - name: length_of_stay
        description: Length of the encounter in days, calculated from
          encounter_start_date and encounter_end_date. Same-day encounters are
          assigned a length of stay of 1.
        config:
          meta:
            data_type: number
      - name: admit_source_code
        description: Code indicating where the patient was immediately before admission,
          when available. This is most relevant for inpatient encounters.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/admit-source
            data_type: varchar
      - name: admit_source_description
        description: Description of admit_source_code, derived from Tuva admit source
          terminology.
        config:
          meta:
            data_type: varchar
      - name: admit_type_code
        description: Code indicating the type or priority of admission, when available.
          This is most relevant for inpatient encounters.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/admit-type
            data_type: varchar
      - name: admit_type_description
        description: Description of admit_type_code, derived from Tuva admit type
          terminology.
        config:
          meta:
            data_type: varchar
      - name: discharge_disposition_code
        description: Code indicating the patient's disposition at discharge, such as
          home, expired, or transferred to another care setting.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/discharge-disposition
            data_type: varchar
      - name: discharge_disposition_description
        description: Description of discharge_disposition_code, derived from Tuva
          discharge disposition terminology.
        config:
          meta:
            data_type: varchar
      - name: attending_provider_id
        description: ID for the attending provider on the encounter. This may be the
          provider's National Provider Identifier (NPI) or a source-system
          provider identifier.
        config:
          meta:
            data_type: varchar
      - name: attending_provider_name
        description: Name of the attending provider associated with the encounter, when
          available.
        config:
          meta:
            data_type: varchar
      - name: facility_npi
        description: National Provider Identifier for the facility where the encounter
          occurred, when available.
        config:
          meta:
            data_type: varchar
      - name: facility_name
        description: Name of the facility or care site where the encounter occurred,
          when available.
        config:
          meta:
            data_type: varchar
      - name: facility_type
        description: Type or category of facility, for example acute care hospital,
          emergency department, or skilled nursing facility.
        config:
          meta:
            data_type: varchar
      - name: observation_flag
        description: Indicates whether the encounter was marked as an observation stay
          (1 for yes, 0 for no).
        config:
          meta:
            data_type: number
      - name: lab_flag
        description: Indicates whether lab services were utilized during the encounter
          (1 for yes, 0 for no).
        config:
          meta:
            data_type: number
      - name: dme_flag
        description: Indicates whether durable medical equipment (DME) was used during
          the encounter (1 for yes, 0 for no).
        config:
          meta:
            data_type: number
      - name: ambulance_flag
        description: Indicates whether ambulance services were utilized during the
          encounter (1 for yes, 0 for no).
        config:
          meta:
            data_type: number
      - name: pharmacy_flag
        description: Indicates whether pharmacy services were utilized during the
          encounter (1 for yes, 0 for no).
        config:
          meta:
            data_type: number
      - name: ed_flag
        description: Indicates whether the encounter involved an emergency department
          visit (1 for yes, 0 for no).
        config:
          meta:
            data_type: number
      - name: delivery_flag
        description: Indicates whether the encounter involved a delivery (1 for yes, 0
          for no).
        config:
          meta:
            data_type: number
      - name: delivery_type
        description: Type of delivery that occurred during the encounter, if applicable.
        config:
          meta:
            data_type: varchar
      - name: newborn_flag
        description: Indicates whether the encounter was for a newborn (1 for yes, 0 for
          no).
        config:
          meta:
            data_type: number
      - name: nicu_flag
        description: Indicates whether the newborn was admitted to the Neonatal
          Intensive Care Unit (NICU) during the encounter (1 for yes, 0 for no).
        config:
          meta:
            data_type: number
      - name: snf_part_b_flag
        description: Indicates whether the inpatient medical service for Medicare covers
          under Part B or not. (1 for yes and 0 for no)
        config:
          meta:
            data_type: number
      - name: primary_diagnosis_code_type
        description: Code system for primary_diagnosis_code, such as icd-10-cm or icd-9-cm.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/code-type
            data_type: varchar
      - name: primary_diagnosis_code
        description: Primary diagnosis code associated with the encounter, when
          available. For claims-derived encounters, this generally comes from
          the institutional claim.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/icd-10-cm
            terminology_note: '**Note: this terminology set is too large to be loaded as a
              seed and is instead loaded from public cloud storage for supported
              adapters.'
            data_type: varchar
      - name: primary_diagnosis_description
        description: Description of the primary diagnosis code, derived from Tuva ICD
          diagnosis terminology when the code type is icd-10-cm or icd-9-cm.
        config:
          meta:
            data_type: varchar
      - name: drg_code_type
        description: Diagnosis-related group code system for drg_code, when a DRG is
          assigned to the encounter. Examples include ms-drg and apr-drg.
        config:
          meta:
            data_type: varchar
      - name: drg_code
        description: Diagnosis-related group code assigned to the encounter, when
          available. This is most relevant for inpatient encounters.
        config:
          meta:
            data_type: varchar
      - name: drg_description
        description: Description of the DRG code, derived from Tuva MS-DRG or APR-DRG
          terminology.
        config:
          meta:
            data_type: varchar
      - name: paid_amount
        description: Total paid amount associated with the encounter, when available.
          For claims-derived encounters, this is aggregated from medical claim
          lines.
        config:
          meta:
            data_type: number
      - name: allowed_amount
        description: Total allowed amount associated with the encounter, including
          payer-paid and patient-responsibility amounts when available. For
          claims-derived encounters, this is aggregated from medical claim
          lines.
        config:
          meta:
            data_type: number
      - name: charge_amount
        description: Total charge amount associated with the encounter before
          adjustments or payments. For claims-derived encounters, this is
          aggregated from medical claim lines.
        config:
          meta:
            data_type: number
      - name: claim_count
        description: Number of medical claims associated with the encounter. This is
          populated for claims-derived encounters.
        config:
          meta:
            data_type: number
      - name: inst_claim_count
        description: Number of institutional claims generated from the encounter.
        config:
          meta:
            data_type: number
      - name: prof_claim_count
        description: Number of professional claims generated from the encounter.
        tests:
          - the_tuva_project.expect_column_values_to_be_between:
              description: Inpatient encounter missing professional claim
              config:
                severity: warn
                enabled: '{{ (var(''claims_enabled'', false)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_5
                  - dqi
              arguments:
                min_value: 1
                row_condition: encounter_type = 'acute inpatient'
                strictly: false
        config:
          meta:
            data_type: number
      - name: source_model
        description: dbt model or relation from which the encounter row was derived.
        config:
          meta:
            data_type: varchar
      - name: encounter_source_type
        description: Indicates whether the encounter row was derived from claims data or
          clinical data.
        config:
          meta:
            data_type: varchar
      - name: tuva_last_run
        description: The last time the data was refreshed. Generated by
          `dbt_utils.pretty_time` as the local time of the `dbt run`
          environment. Timezone is configurable via the `tuva_last_run` var.
        config:
          meta:
            data_type: timestamp
      - name: data_source
        description: User-defined name that identifies the source of the encounter data,
          for example a claims payer data source or a clinical system such as
          Epic, Athena Health, or Cerner.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
            is_primary_key: true
  - name: core__immunization
    description: |-
      The immunization table stores clinical immunization events from source systems. It includes vaccines administered to patients and, when available, records documenting that an immunization was not performed.

      Tuva normalizes supported source vaccine codes in this model by joining source_code_type and source_code to CVX terminology, or to custom mappings when the normalization engine is enabled. Status, status reason, body site, and route are also enriched from Tuva terminology when supported source codes are available. Normalized dose is retained for schema compatibility but is not currently populated by Tuva.

      This table is intended to have one record per immunization ID and data source.

      Primary key: immunization_id, data_source.
    tests:
      - dbt_utils.unique_combination_of_columns:
          config:
            severity: warn
          arguments:
            combination_of_columns:
              - immunization_id
              - data_source
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_core
        {% else %}core{%- endif -%}
      alias: immunization
      tags: core
      materialized: table
    columns:
      - name: immunization_id
        description: Identifier for an immunization event within a data source. This
          value should identify the immunization event when combined with
          data_source.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: person_id
        description: Globally unique identifier for the person associated with the
          immunization.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
      - name: patient_id
        description: Identifier that links the person to a particular clinical source
          system, for example a medical record number or MRN.
        config:
          meta:
            data_type: varchar
      - name: encounter_id
        description: Identifier for the encounter associated with the immunization, when
          available.
        config:
          meta:
            data_type: varchar
      - name: source_code_type
        description: Code system for source_code. CVX is preferred when available, but
          local or other source code systems may be present when source data
          cannot provide CVX.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/code-type
            data_type: varchar
      - name: source_code
        description: Vaccine code from the source system. CVX codes are normalized
          automatically by joining to Tuva CVX terminology.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/cvx
            terminology_note: '**Note: this terminology set is too large to be loaded as a
              seed and is instead loaded from public cloud storage for supported
              adapters.'
            data_type: varchar
      - name: source_description
        description: Human-readable description of source_code from the source system.
        config:
          meta:
            data_type: varchar
      - name: normalized_code_type
        description: Normalized vaccine code system. This is set to cvx when
          source_code_type and source_code match Tuva CVX terminology, or
          populated from custom mappings when the normalization engine is
          enabled.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/code-type
            data_type: varchar
      - name: normalized_code
        description: Normalized CVX vaccine code. This is derived from Tuva CVX
          terminology or from custom mappings when the normalization engine is
          enabled.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/cvx
            terminology_note: '**Note: this terminology set is too large to be loaded as a
              seed and is instead loaded from public cloud storage for supported
              adapters.'
            data_type: varchar
      - name: normalized_description
        description: Human-readable description for normalized_code, populated from Tuva
          CVX terminology or from custom mappings when available.
        config:
          meta:
            data_type: varchar
      - name: mapping_method
        description: Method used to populate normalized_code_type, normalized_code, and
          normalized_description. Automatic means Tuva matched the source code
          to CVX terminology. Custom means the normalization engine populated
          the normalized fields from a custom mapping. Not-mapped values may be
          populated by the normalization engine when a custom mapping explicitly
          marks the source value as unmapped.
        config:
          meta:
            data_type: varchar
      - name: status
        description: Immunization event status. When the source status code matches Tuva
          immunization status terminology, this field is populated with the
          terminology status value; otherwise, the source value is retained.
        config:
          meta:
            data_type: varchar
      - name: status_reason
        description: Reason the immunization was not performed, when applicable. When
          the source reason code matches Tuva immunization status reason
          terminology, this field is populated with the terminology description;
          otherwise, the source value is retained.
        config:
          meta:
            data_type: varchar
      - name: occurrence_date
        description: Date the immunization occurred or was documented as not performed.
        config:
          meta:
            data_type: date
      - name: source_dose
        description: Dose quantity or dose text from the source system, when available.
          This field is source-system specific and is not normalized by Tuva.
        config:
          meta:
            data_type: varchar
      - name: normalized_dose
        description: Reserved normalized dose field retained for schema compatibility.
          Tuva does not currently normalize immunization dose, so this field is
          null.
        config:
          meta:
            data_type: varchar
      - name: lot_number
        description: Lot number of the vaccine product administered, when available.
        config:
          meta:
            data_type: varchar
      - name: body_site
        description: Body site where the vaccine was administered. When the source body
          site code matches Tuva act site terminology, this field is populated
          with the terminology description; otherwise, the source value is
          retained.
        config:
          meta:
            data_type: varchar
      - name: route
        description: Route used to administer the vaccine. When the source route code
          matches Tuva immunization route terminology, this field is populated
          with the terminology description; otherwise, the source value is
          retained.
        config:
          meta:
            data_type: varchar
      - name: location_id
        description: Identifier for the location or facility where the immunization was
          administered or documented, when available.
        config:
          meta:
            data_type: varchar
      - name: practitioner_id
        description: Identifier for the practitioner associated with the immunization,
          when available. This may represent the ordering, administering, or
          documenting practitioner depending on the source system.
        config:
          meta:
            data_type: varchar
      - name: tuva_last_run
        description: The last time the data was refreshed. Generated by
          `dbt_utils.pretty_time` as the local time of the `dbt run`
          environment. Timezone is configurable via the `tuva_last_run` var.
        config:
          meta:
            data_type: timestamp
      - name: data_source
        description: User-defined name that identifies the source of the immunization
          data, for example Epic, Athena Health, or Cerner.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
            is_primary_key: true
  - name: core__lab_result
    description: |-
      The lab_result table stores laboratory test result records from clinical source systems. It includes information about the ordered test or panel, the resulted component or analyte, the result value, result and collection dates, units, reference ranges, abnormal flags, specimen, and ordering practitioner.

      Tuva normalizes supported source order and component codes in this model by joining source_order_type, source_order_code, source_component_type, and source_component_code to LOINC and SNOMED-CT terminology, or to custom mappings when the normalization engine is enabled. Normalized units, normalized reference ranges, and normalized abnormal flags are passed through from the input layer when they are populated upstream.

      This table is intended to have one record per lab result ID and data source.

      Primary key: lab_result_id, data_source.
    tests:
      - dbt_utils.unique_combination_of_columns:
          config:
            severity: warn
          arguments:
            combination_of_columns:
              - lab_result_id
              - data_source
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_core
        {% else %}core{%- endif -%}
      alias: lab_result
      tags: core
      materialized: table
    columns:
      - name: lab_result_id
        description: Identifier for a lab result record within a data source. This value
          identifies the lab result when combined with data_source.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: person_id
        description: Globally unique identifier for the person associated with the lab
          result.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
      - name: patient_id
        description: Identifier that links the person to a particular clinical source
          system, for example a medical record number or MRN.
        config:
          meta:
            data_type: varchar
      - name: encounter_id
        description: Identifier for the encounter associated with the lab result, when
          available.
        config:
          meta:
            data_type: varchar
      - name: accession_number
        description: Lab accession number, order number, or specimen tracking identifier
          from the source system.
        config:
          meta:
            data_type: varchar
      - name: source_order_type
        description: Code system for source_order_code. This field describes the ordered
          lab test or panel.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/code-type
            data_type: varchar
      - name: source_order_code
        description: Code for the ordered lab test or panel from the source system.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/loinc
            terminology_note: '**Note: this terminology set is too large to be loaded as a
              seed and is instead loaded from public cloud storage for supported
              adapters.'
            data_type: varchar
      - name: source_order_description
        description: Human-readable description of source_order_code from the source system.
        config:
          meta:
            data_type: varchar
      - name: source_component_type
        description: Code system for source_component_code. This field describes the
          resulted component or analyte.
        config:
          meta:
            data_type: varchar
      - name: source_component_code
        description: Code for the resulted component or analyte from the source system.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/loinc
            terminology_note: '**Note: this terminology set is too large to be loaded as a
              seed and is instead loaded from public cloud storage for supported
              adapters.'
            data_type: varchar
      - name: source_component_description
        description: Human-readable description of source_component_code from the source
          system.
        config:
          meta:
            data_type: varchar
      - name: normalized_order_type
        description: Normalized code system for the ordered lab test or panel. This is
          derived from LOINC or SNOMED-CT terminology, or from custom mappings
          when the normalization engine is enabled.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/code-type
            data_type: varchar
      - name: normalized_order_code
        description: Normalized code for the ordered lab test or panel. This is derived
          from LOINC or SNOMED-CT terminology, or from custom mappings when the
          normalization engine is enabled.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/loinc
            terminology_note: '**Note: this terminology set is too large to be loaded as a
              seed and is instead loaded from public cloud storage for supported
              adapters.'
            data_type: varchar
      - name: normalized_order_description
        description: Human-readable description for normalized_order_code, populated
          from terminology or custom mappings when available.
        config:
          meta:
            data_type: varchar
      - name: mapping_method
        description: Method used to populate normalized order and component code fields.
          Automatic means Tuva matched the source code to LOINC or SNOMED-CT
          terminology. Custom means the normalization engine populated
          normalized fields from a custom mapping. Not-mapped values may be
          populated by the normalization engine when a custom mapping explicitly
          marks the source value as unmapped.
        config:
          meta:
            data_type: varchar
      - name: normalized_component_type
        description: Normalized code system for the resulted component or analyte. This
          is derived from LOINC or SNOMED-CT terminology, or from custom
          mappings when the normalization engine is enabled.
        config:
          meta:
            data_type: varchar
      - name: normalized_component_code
        description: Normalized code for the resulted component or analyte. This is
          derived from LOINC or SNOMED-CT terminology, or from custom mappings
          when the normalization engine is enabled.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/loinc
            terminology_note: '**Note: this terminology set is too large to be loaded as a
              seed and is instead loaded from public cloud storage for supported
              adapters.'
            data_type: varchar
      - name: normalized_component_description
        description: Human-readable description for normalized_component_code, populated
          from terminology or custom mappings when available.
        config:
          meta:
            data_type: varchar
      - name: status
        description: Source status of the lab result, for example final, preliminary,
          corrected, cancelled, or entered in error.
        config:
          meta:
            data_type: varchar
      - name: result
        description: Result value reported by the source system. This may be numeric,
          coded, or text.
        config:
          meta:
            data_type: varchar
      - name: result_datetime
        description: Date and time the lab result was resulted, reported, or finalized.
        config:
          meta:
            data_type: timestamp
      - name: collection_datetime
        description: Date and time the specimen was collected.
        config:
          meta:
            data_type: timestamp
      - name: source_units
        description: Units for result as reported by the source system.
        config:
          meta:
            data_type: varchar
      - name: normalized_units
        description: Standardized units for result, when available. Tuva passes this
          through from the input layer when it is populated upstream.
        config:
          meta:
            data_type: varchar
      - name: source_reference_range_low
        description: Lower bound of the reference range as reported by the source system.
        config:
          meta:
            data_type: varchar
      - name: source_reference_range_high
        description: Upper bound of the reference range as reported by the source system.
        config:
          meta:
            data_type: varchar
      - name: normalized_reference_range_low
        description: Standardized lower bound of the reference range, when available.
          Tuva passes this through from the input layer when it is populated
          upstream.
        config:
          meta:
            data_type: varchar
      - name: normalized_reference_range_high
        description: Standardized upper bound of the reference range, when available.
          Tuva passes this through from the input layer when it is populated
          upstream.
        config:
          meta:
            data_type: varchar
      - name: source_abnormal_flag
        description: Abnormal or interpretation flag from the source system.
        config:
          meta:
            data_type: varchar
      - name: normalized_abnormal_flag
        description: Standardized abnormal or interpretation flag, when available. Tuva
          passes this through from the input layer when it is populated
          upstream.
        config:
          meta:
            data_type: varchar
      - name: specimen
        description: Specimen type for the lab result, for example blood, serum, plasma,
          or urine.
        config:
          meta:
            data_type: varchar
      - name: ordering_practitioner_id
        description: Identifier for the practitioner who ordered the lab test, when
          available. This may be an NPI or a source system practitioner ID.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/provider
            terminology_note: '**Note: this terminology set is too large to be loaded as a
              seed and is instead loaded from public cloud storage for supported
              adapters.'
            data_type: varchar
      - name: tuva_last_run
        description: The last time the data was refreshed. Generated by
          `dbt_utils.pretty_time` as the local time of the `dbt run`
          environment. Timezone is configurable via the `tuva_last_run` var.
        config:
          meta:
            data_type: timestamp
      - name: data_source
        description: User-defined name that identifies the source of the lab result
          data, for example Epic, Athena Health, or Cerner.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
            is_primary_key: true
  - name: core__location
    description: |-
      The location table contains information about physical locations where clinical care is delivered, documented, or managed. A location may represent a facility, clinic, department, practice site, laboratory, imaging center, or other service location.

      When clinical data is enabled, this table pulls location records from input_layer__location. When claims data is enabled, Tuva derives organization locations from provider data for organization NPIs that appear on medical or pharmacy claims. Clinical extension columns are pulled through when clinical data is enabled.

      Primary key: location_id.
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_core
        {% else %}core{%- endif -%}
      alias: location
      tags: core
      materialized: table
    columns:
      - name: location_id
        description: Identifier for a location. For clinical locations, this is the
          source system location identifier. For claims-derived organization
          locations, this is the organization NPI.
        tests:
          - unique:
              config:
                severity: warn
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: npi
        description: National Provider Identifier associated with the location, when
          available. For facilities or organizations, this should generally be
          an organization NPI rather than an individual practitioner NPI.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/provider
            terminology_note: '**Note: this terminology set is too large to be loaded as a
              seed and is instead loaded from public cloud storage for supported
              adapters.'
            data_type: varchar
      - name: name
        description: Name of the location.
        config:
          meta:
            data_type: varchar
      - name: facility_type
        description: Type or category of location, for example hospital, clinic,
          emergency department, ambulatory surgery center, laboratory, imaging
          center, or department.
        config:
          meta:
            data_type: varchar
      - name: parent_organization
        description: Organization, health system, practice group, or parent facility
          associated with the location, when available.
        config:
          meta:
            data_type: varchar
      - name: address
        description: Street address of the location.
        config:
          meta:
            data_type: varchar
      - name: city
        description: City of the location.
        config:
          meta:
            data_type: varchar
      - name: state
        description: State of the location.
        config:
          meta:
            data_type: varchar
      - name: zip_code
        description: ZIP code or postal code of the location.
        config:
          meta:
            data_type: varchar
      - name: latitude
        description: Latitude of the location in decimal degrees, when available.
        config:
          meta:
            data_type: float
      - name: longitude
        description: Longitude of the location in decimal degrees, when available.
        config:
          meta:
            data_type: float
      - name: tuva_last_run
        description: The last time the data was refreshed. Generated by
          `dbt_utils.pretty_time` as the local time of the `dbt run`
          environment. Timezone is configurable via the `tuva_last_run` var.
        config:
          meta:
            data_type: timestamp
      - name: data_source
        description: User-defined name that identifies the clinical source system for
          the location data, when populated. Claims-derived organization
          locations may have a null data_source.
        config:
          meta:
            data_type: varchar
  - name: core__medical_claim
    description: |-
      The medical claim table stores final adjudicated medical claim lines for healthcare services or supplies billed by a provider and adjudicated by a payer. A single claim may have multiple claim lines, so claim_id identifies the claim and claim_line_number identifies the specific line within that claim.

      This model pulls from claims preprocessing, enriches claim lines with encounter grouping, service categories, terminology descriptions, and enrollment matching, and passes through claim extension columns and file metadata. Header-level fields, such as claim_type, person_id, payer, plan, claim_start_date, claim_end_date, admission_date, and discharge_date, should be consistent across all lines for the same claim_id. Line-level fields, such as claim_line_start_date, claim_line_end_date, revenue_center_code, hcpcs_code, service_unit_quantity, and payment amounts, may vary across claim lines.

      Table grain: One record per medical claim line per data source.

      Primary key: medical_claim_id.
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_core
        {% else %}core{%- endif -%}
      alias: medical_claim
      tags:
        - core
        - encounters
      materialized: table
    columns:
      - name: medical_claim_id
        description: Synthetic primary key for each medical claim line, created from
          claim_id, claim_line_number, and data_source.
        tests:
          - unique
          - not_null
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: claim_id
        description: Identifier for a medical claim. A claim may contain multiple claim
          lines, so the same claim_id may appear on multiple rows.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
      - name: claim_line_number
        description: Line number for the claim line represented by the row. Values
          should be positive integers and should uniquely identify each line
          within a claim_id.
        tests:
          - not_null
        data_type: integer
        config:
          meta:
            data_type: number
      - name: encounter_id
        description: Identifier for the encounter associated with the claim line,
          created by claims preprocessing when the claim line is grouped into an
          encounter.
        config:
          meta:
            data_type: varchar
      - name: encounter_type
        description: Type of encounter assigned by claims preprocessing, such as acute
          inpatient, emergency department, outpatient, office visit, or skilled
          nursing facility.
        config:
          meta:
            data_type: varchar
      - name: encounter_group
        description: Higher-level grouping of encounter_type used for utilization and
          reporting.
        config:
          meta:
            data_type: varchar
      - name: claim_type
        description: Header-level classification of the medical claim as professional,
          institutional, or undetermined. Professional claims generally have
          place_of_service_code; institutional claims generally have
          bill_type_code and revenue_center_code.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/claim-type
            data_type: varchar
      - name: person_id
        description: Globally unique identifier for the person who received care.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
      - name: member_id
        description: Identifier assigned by the payer or health plan for the person's
          coverage. This should identify the member associated with the claim.
        config:
          meta:
            data_type: varchar
      - name: payer
        description: Name of the payer responsible for the claim, for example Aetna,
          Blue Cross Blue Shield, or Medicare FFS.
        config:
          meta:
            data_type: varchar
      - name: plan
        description: Name of the health insurance plan or product associated with the claim.
        config:
          meta:
            data_type: varchar
      - name: claim_start_date
        description: Header-level start date for the claim. This value should be
          consistent across all lines for the same claim_id.
        config:
          meta:
            data_type: date
      - name: claim_end_date
        description: Header-level end date for the claim. This value should be
          consistent across all lines for the same claim_id and should be
          greater than or equal to claim_start_date.
        config:
          meta:
            data_type: date
      - name: claim_line_start_date
        description: Start date for the service or item represented by the claim line.
          This may differ across lines within the same claim.
        config:
          meta:
            data_type: date
      - name: claim_line_end_date
        description: End date for the service or item represented by the claim line.
          This may differ across lines within the same claim and should be
          greater than or equal to claim_line_start_date.
        config:
          meta:
            data_type: date
      - name: admission_date
        description: Header-level admission date for an inpatient institutional claim.
          Populated when the claim represents an inpatient facility stay.
        config:
          meta:
            data_type: date
      - name: discharge_date
        description: Header-level discharge date for an inpatient institutional claim.
          Populated when the claim represents an inpatient facility stay.
        config:
          meta:
            data_type: date
      - name: service_category_1
        description: The broader service category this claim belongs to.
        config:
          meta:
            terminology: https://thetuvaproject.com/value-sets/service-categories
            data_type: varchar
      - name: service_category_2
        description: The more specific service category this claim belongs to.
        config:
          meta:
            terminology: https://thetuvaproject.com/value-sets/service-categories
            data_type: varchar
      - name: service_category_3
        description: The most specific service category this claim belongs to.
        config:
          meta:
            data_type: varchar
      - name: admit_source_code
        description: Indicates where the patient was before the healthcare encounter
          (inpatient claims only).
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/admit-source
            data_type: varchar
      - name: admit_source_description
        description: Description of the admit_source_code for the encounter.
        config:
          meta:
            data_type: varchar
      - name: admit_type_code
        description: Indicates the type of admission (inpatient claims only).
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/admit-type
            data_type: varchar
      - name: admit_type_description
        description: Description of the admit_type_code for the encounter.
        config:
          meta:
            data_type: varchar
      - name: discharge_disposition_code
        description: Indicates the type of setting the patient was discharged to
          (institutional inpatient claims only).
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/discharge-disposition
            data_type: varchar
      - name: discharge_disposition_description
        description: Description of the discharge_disposition_code for the encounter.
        config:
          meta:
            data_type: varchar
      - name: place_of_service_code
        description: Line-level code indicating where a professional service was
          provided. Professional claim lines should generally have a
          place_of_service_code; institutional claims should generally not.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/place-of-service
            data_type: varchar
      - name: place_of_service_description
        description: Description of place_of_service_code, derived from Tuva place of
          service terminology.
        config:
          meta:
            data_type: varchar
      - name: bill_type_code
        description: Header-level bill type code for institutional claims. This
          identifies the type of facility claim and should be consistent across
          all lines for the same claim_id.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/bill-type
            data_type: varchar
      - name: bill_type_description
        description: Description of bill_type_code, derived from Tuva bill type terminology.
        config:
          meta:
            data_type: varchar
      - name: drg_code_type
        description: Diagnosis-related group code system for drg_code, when a DRG is
          assigned to the claim. Examples include ms-drg and apr-drg.
        config:
          meta:
            data_type: varchar
      - name: drg_code
        description: Diagnosis-related group code assigned to the claim, when available.
          This is most relevant for inpatient institutional claims.
        config:
          meta:
            data_type: varchar
      - name: drg_description
        description: Description of drg_code, derived from Tuva MS-DRG or APR-DRG
          terminology.
        config:
          meta:
            data_type: varchar
      - name: revenue_center_code
        description: Line-level revenue center code for institutional claims. This
          identifies the department or service area associated with the claim
          line and should preserve leading zeroes when present.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/revenue-center
            data_type: varchar
      - name: revenue_center_description
        description: Description of revenue_center_code, derived from Tuva revenue
          center terminology.
        config:
          meta:
            data_type: varchar
      - name: service_unit_quantity
        description: Number of service units associated with the claim line. For
          institutional claims this often corresponds to the revenue center
          line.
        config:
          meta:
            data_type: number
      - name: hcpcs_code
        description: CPT or HCPCS code for the procedure, service, or supply on the
          claim line.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/hcpcs-level-2
            data_type: varchar
      - name: hcpcs_modifier_1
        description: 1st modifier for HCPCS code.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/hcpcs-level-2
            data_type: varchar
      - name: hcpcs_modifier_2
        description: 2nd modifier for HCPCS code.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/hcpcs-level-2
            data_type: varchar
      - name: hcpcs_modifier_3
        description: 3rd modifier for HCPCS code.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/hcpcs-level-2
            data_type: varchar
      - name: hcpcs_modifier_4
        description: 4th modifier for HCPCS code.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/hcpcs-level-2
            data_type: varchar
      - name: hcpcs_modifier_5
        description: 5th modifier for HCPCS code.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/hcpcs-level-2
            data_type: varchar
      - name: rendering_npi
        description: NPI for the practitioner or provider who rendered the service on
          the claim line. This is generally line-level and may vary across
          lines.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/provider
            terminology_note: '**Note: this terminology set is too large to be loaded as a
              seed and is instead loaded from public cloud storage for supported
              adapters.'
            data_type: varchar
      - name: rendering_tin
        description: Rendering provider tax identification number (TIN).
        config:
          meta:
            data_type: varchar
      - name: rendering_name
        description: Rendering provider name.
        config:
          meta:
            data_type: varchar
      - name: billing_npi
        description: NPI for the billing provider or organization responsible for
          submitting the claim. This is generally header-level and should be
          consistent across lines for the same claim_id.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/provider
            terminology_note: '**Note: this terminology set is too large to be loaded as a
              seed and is instead loaded from public cloud storage for supported
              adapters.'
            data_type: varchar
      - name: billing_tin
        description: Billing provider tax identification number (TIN).
        config:
          meta:
            data_type: varchar
      - name: billing_name
        description: Billing provider name.
        config:
          meta:
            data_type: varchar
      - name: facility_npi
        description: NPI for the facility where services were delivered. This is
          especially important for institutional claims and encounter grouping.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/provider
            terminology_note: '**Note: this terminology set is too large to be loaded as a
              seed and is instead loaded from public cloud storage for supported
              adapters.'
            data_type: varchar
      - name: facility_name
        description: Name of the facility where services were delivered, when available.
        config:
          meta:
            data_type: varchar
      - name: paid_date
        description: Date the claim was paid by the payer. This often occurs after
          claim_end_date.
        config:
          meta:
            data_type: date
      - name: paid_amount
        description: Amount paid by the payer for the claim line after adjustment,
          denial, reversal, and replacement logic has been applied.
        config:
          meta:
            data_type: number
      - name: allowed_amount
        description: Total allowed amount for the claim line, including payer-paid and
          patient-responsibility amounts.
        config:
          meta:
            data_type: number
      - name: charge_amount
        description: Amount charged or billed by the provider for the claim line before
          payer adjudication.
        config:
          meta:
            data_type: number
      - name: coinsurance_amount
        description: Coinsurance amount owed by the member for the claim line. This
          represents percentage-based member cost sharing.
        config:
          meta:
            data_type: number
      - name: copayment_amount
        description: Copayment amount owed by the member for the claim line. This
          represents fixed-dollar member cost sharing.
        config:
          meta:
            data_type: number
      - name: deductible_amount
        description: Deductible amount owed by the member for the claim line before
          payer coverage applies.
        config:
          meta:
            data_type: number
      - name: total_cost_amount
        description: Total cost amount for the claim line. This may equal
          allowed_amount, but can differ when the source includes additional
          cost components not captured by the standard payer-paid and
          patient-responsibility fields.
        config:
          meta:
            data_type: number
      - name: in_network_flag
        description: Indicator for whether the claim was in network. Accepted values are
          1 for in network, 0 for out of network, and null when unknown.
        config:
          meta:
            data_type: number
      - name: enrollment_flag
        description: Indicator for whether the claim line has corresponding eligibility
          during the same period when the service occurred.
        config:
          meta:
            data_type: number
      - name: member_month_key
        description: Synthetic key for the member month associated with the claim line
          when matching eligibility is available.
        config:
          meta:
            data_type: number
      - name: file_date
        description: Date associated with the source file. This may represent the
          delivery date, reporting period, or date embedded in the file name.
        config:
          meta:
            data_type: timestamp
      - name: ingest_datetime
        description: Date and time the source claim line or file was loaded into the
          data warehouse. This is useful when multiple versions of the same
          claim line are received over time.
        config:
          meta:
            data_type: timestamp
      - name: file_name
        description: Name of the source file from which the claim line originated. This
          field is useful for tracing source records across file-based claims
          extracts.
        config:
          meta:
            data_type: varchar
      - name: tuva_last_run
        description: The last time the data was refreshed. Generated by
          `dbt_utils.pretty_time` as the local time of the `dbt run`
          environment. Timezone is configurable via the `tuva_last_run` var.
        config:
          meta:
            data_type: timestamp
      - name: data_source
        description: User-defined name that identifies the source of the medical claim
          data, for example BCBS Tennessee, Medicare FFS, or Medicaid Ohio.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
  - name: core__medication
    description: |-
      The medication table contains medication records from clinical source systems, including medication orders, administrations, and dispense records documented in an EHR or other clinical system.

      This model pulls from input_layer__medication, casts fields to the core medication data types, and derives NDC, RxNorm, and ATC descriptions from terminology and custom mapping logic. Standardized medication codes may come from fields populated by the user in the input layer, automatic terminology joins, or custom mappings from the normalization engine.

      Primary key: medication_id, data_source.
    tests:
      - dbt_utils.unique_combination_of_columns:
          config:
            severity: warn
          arguments:
            combination_of_columns:
              - medication_id
              - data_source
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_core
        {% else %}core{%- endif -%}
      alias: medication
      tags: core
      materialized: table
    columns:
      - name: medication_id
        description: Identifier for a medication record within a data source.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: person_id
        description: Globally unique identifier for the person associated with the
          medication record.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
      - name: patient_id
        description: Identifier that links the person to a particular clinical source
          system, for example a medical record number or MRN.
      - name: encounter_id
        description: Identifier for the encounter associated with the medication record,
          when available.
        config:
          meta:
            data_type: varchar
      - name: dispensing_date
        description: Date the medication was dispensed or administered, when available.
        config:
          meta:
            data_type: date
      - name: prescribing_date
        description: Date the medication was prescribed or ordered, when available.
        config:
          meta:
            data_type: date
      - name: source_code_type
        description: Code system for source_code. This may be a standard code system
          such as NDC or RxNorm, or a local source system code type.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/code-type
            data_type: varchar
      - name: source_code
        description: Medication code from the source system before Tuva normalization.
          This field preserves the original medication identifier used for
          terminology and custom mapping.
        config:
          meta:
            terminology: https://www.nlm.nih.gov/research/umls/rxnorm/index.html
            data_type: varchar
      - name: source_description
        description: Medication name or description from the source system.
        config:
          meta:
            data_type: varchar
      - name: ndc_code
        description: National Drug Code for the medication. This may be populated from
          the input layer, automatic terminology matching, or custom mapping.
        config:
          meta:
            terminology: https://www.fda.gov/drugs/drug-approvals-and-databases/national-drug-code-directory
            data_type: varchar
      - name: ndc_description
        description: Medication description associated with ndc_code, derived from
          terminology or custom mapping when available.
        config:
          meta:
            data_type: varchar
      - name: ndc_mapping_method
        description: Method used to populate ndc_code and ndc_description. Values can
          include manual when the input layer supplied the code, automatic when
          Tuva terminology matched the source code, or custom when the
          normalization engine supplied the mapping.
        config:
          meta:
            data_type: varchar
      - name: rxnorm_code
        description: RxNorm RxCUI for the medication. This may be populated from the
          input layer, automatic terminology matching, or custom mapping.
        config:
          meta:
            terminology: https://www.nlm.nih.gov/research/umls/rxnorm/index.html
            data_type: varchar
      - name: rxnorm_description
        description: Medication description associated with rxnorm_code, derived from
          terminology or custom mapping when available.
        config:
          meta:
            data_type: varchar
      - name: rxnorm_mapping_method
        description: Method used to populate rxnorm_code and rxnorm_description. Values
          can include manual when the input layer supplied the code, automatic
          when Tuva terminology matched the source code, or custom when the
          normalization engine supplied the mapping.
        config:
          meta:
            data_type: varchar
      - name: atc_code
        description: WHO Anatomical Therapeutic Chemical classification code for the
          medication. This may be populated from the input layer, automatic
          terminology matching, or custom mapping.
        config:
          meta:
            terminology: https://www.who.int/tools/atc-ddd-toolkit/atc-classification
            data_type: varchar
      - name: atc_description
        description: Medication classification description associated with atc_code,
          derived from terminology or custom mapping when available.
        config:
          meta:
            data_type: varchar
      - name: atc_mapping_method
        description: Method used to populate atc_code and atc_description. Values can
          include manual when the input layer supplied the code, automatic when
          Tuva terminology matched the source code, or custom when the
          normalization engine supplied the mapping.
        config:
          meta:
            data_type: varchar
      - name: route
        description: Route by which the medication was administered or intended to be
          administered.
        config:
          meta:
            data_type: varchar
      - name: strength
        description: Medication strength as represented by the source system.
        config:
          meta:
            data_type: varchar
      - name: quantity
        description: Numeric quantity of medication associated with the record.
        config:
          meta:
            data_type: number
      - name: quantity_unit
        description: Unit of measure for quantity.
        config:
          meta:
            data_type: varchar
      - name: days_supply
        description: Number of days the medication supply is expected to last.
        config:
          meta:
            data_type: number
      - name: practitioner_id
        description: Identifier for the practitioner associated with the medication
          record, such as the ordering, prescribing, or administering
          practitioner.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/provider
            terminology_note: '**Note: this terminology set is too large to be loaded as a
              seed and is instead loaded from public cloud storage for supported
              adapters.'
            data_type: varchar
      - name: tuva_last_run
        description: 'The last time the data was refreshed. Generated by
          `dbt_utils.pretty_time` as the local time of the `dbt run`
          environment. Timezone is configurable via the `tuva_last_run` var.'
      - name: data_source
        description: User-defined name that identifies the source of the medication data.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
            is_primary_key: true
  - name: core__member_months
    description: |-
      The member months table stores one record per person, member, year month, payer, plan, and data source from eligibility spans. Members without claims are included because this table is derived from eligibility, not claim activity.

      This model expands eligibility spans into covered member months, creates member_month_key as a synthetic key, joins externally supplied provider attribution when available, and passes through payer-attributed and custom-attributed provider fields for downstream financial, quality, and population health analysis.

      Primary key: member_month_key.
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_core
        {% else %}core{%- endif -%}
      alias: member_months
      tags: core
      materialized: table
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - member_month_key
    columns:
      - name: member_month_key
        description: Synthetic key created from person_id, member_id, year_month, payer,
          plan, and data_source.
        tests:
          - not_null
        config:
          meta:
            data_type: number
            is_primary_key: true
      - name: person_id
        description: Globally unique identifier for the person covered during the member
          month.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
      - name: member_id
        description: Identifier assigned by the payer or health plan for the person's
          coverage during the member month.
        config:
          meta:
            data_type: varchar
      - name: year_month
        description: Calendar month of eligibility represented by the member month.
        config:
          meta:
            data_type: varchar
      - name: payer
        description: Name of the payer providing coverage during the member month.
        config:
          meta:
            data_type: varchar
      - name: plan
        description: Name of the health insurance plan or product associated with the
          member month.
        config:
          meta:
            data_type: varchar
      - name: tuva_last_run
        description: The last time the data was refreshed. Generated by
          `dbt_utils.pretty_time` as the local time of the `dbt run`
          environment. Timezone is configurable via the `tuva_last_run` var.
        config:
          meta:
            data_type: varchar
      - name: payer_attributed_provider
        description: Provider assigned to the member by the payer, health plan,
          contract, or other external attribution source.
      - name: payer_attributed_provider_practice
        description: Practice assigned to the member by the payer or external
          attribution source.
      - name: payer_attributed_provider_organization
        description: Organization assigned to the member by the payer or external
          attribution source.
      - name: payer_attributed_provider_lob
        description: Line of business assigned to the member by the payer or external
          attribution source.
      - name: custom_attributed_provider
        description: Provider assigned to the member by a user-defined or custom
          attribution methodology.
      - name: custom_attributed_provider_practice
        description: Practice assigned to the member by a user-defined or custom
          attribution methodology.
      - name: custom_attributed_provider_organization
        description: Organization assigned to the member by a user-defined or custom
          attribution methodology.
      - name: custom_attributed_provider_lob
        description: Line of business assigned to the member by a user-defined or custom
          attribution methodology.
      - name: data_source
        description: User-defined name that identifies the source of the eligibility
          data used to create the member month.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
  - name: core__observation
    description: |-
      The observation table contains normalized clinical observation records from source systems, including vital signs, social history observations, survey results, exam findings, imaging observations, therapy observations, activity observations, and other non-laboratory clinical observations.

      This model pulls from input_layer__observation, casts fields to the core observation data types, normalizes observation_type using Tuva reference data, and derives normalized_code_type, normalized_code, and normalized_description from terminology joins or custom mapping logic. Normalized units and normalized reference ranges are passed through from the input layer when they are populated upstream.

      Primary key: observation_id, data_source.
    tests:
      - dbt_utils.unique_combination_of_columns:
          config:
            severity: warn
          arguments:
            combination_of_columns:
              - observation_id
              - data_source
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_core
        {% else %}core{%- endif -%}
      alias: observation
      tags: core
      materialized: table
    columns:
      - name: observation_id
        description: Identifier for an observation record within a data source. This
          value identifies the observation when combined with data_source.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: person_id
        description: Globally unique identifier for the person associated with the
          observation.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
      - name: patient_id
        description: Identifier that links the person to a particular clinical source
          system, for example a medical record number or MRN.
        config:
          meta:
            data_type: varchar
      - name: encounter_id
        description: Identifier for the encounter associated with the observation, when
          available.
        config:
          meta:
            data_type: varchar
      - name: panel_id
        description: Identifier for a group or panel of related observations, when
          available.
        config:
          meta:
            data_type: varchar
      - name: observation_date
        description: Date the observation was recorded, observed, or resulted.
        config:
          meta:
            data_type: date
      - name: observation_type
        description: High-level category of observation after Tuva reference-data
          normalization.
        config:
          meta:
            data_type: varchar
      - name: source_code_type
        description: Code system for source_code as represented in the source system.
        config:
          meta:
            terminology: https://thetuvaproject.com/terminology/code-type
            data_type: varchar
      - name: source_code
        description: Observation code from the source system before Tuva normalization.
        config:
          meta:
            data_type: varchar
      - name: source_description
        description: Observation name or description from the source system.
        config:
          meta:
            data_type: varchar
      - name: normalized_code_type
        description: Normalized observation code system derived from Tuva terminology or
          custom mapping logic.
        config:
          meta:
            data_type: varchar
      - name: normalized_code
        description: Normalized observation code derived from Tuva terminology or custom
          mapping logic.
        config:
          meta:
            data_type: varchar
      - name: normalized_description
        description: Human-readable description for normalized_code, derived from Tuva
          terminology or custom mapping logic.
        config:
          meta:
            data_type: varchar
      - name: mapping_method
        description: Method used to populate normalized_code_type, normalized_code, and
          normalized_description. Automatic means Tuva matched the source code
          to terminology. Custom means the normalization engine supplied the
          mapping.
        config:
          meta:
            data_type: varchar
      - name: result
        description: Observation result value as represented in the source system.
        config:
          meta:
            data_type: varchar
      - name: source_units
        description: Unit of measure for result as represented in the source system.
        config:
          meta:
            data_type: varchar
      - name: normalized_units
        description: Standardized unit of measure for result, when available.
        config:
          meta:
            data_type: varchar
      - name: source_reference_range_low
        description: Lower bound of the reference range from the source system, when
          available.
        config:
          meta:
            data_type: varchar
      - name: source_reference_range_high
        description: Upper bound of the reference range from the source system, when
          available.
        config:
          meta:
            data_type: varchar
      - name: normalized_reference_range_low
        description: Standardized lower bound of the reference range, when available.
          This should use the same unit convention as normalized_units.
        config:
          meta:
            data_type: varchar
      - name: normalized_reference_range_high
        description: Standardized upper bound of the reference range, when available.
          This should use the same unit convention as normalized_units.
        config:
          meta:
            data_type: varchar
      - name: tuva_last_run
        description: The last time the data was refreshed. Generated by
          `dbt_utils.pretty_time` as the local time of the `dbt run`
          environment. Timezone is configurable via the `tuva_last_run` var.
        config:
          meta:
            data_type: timestamp
      - name: data_source
        description: User-defined name that identifies the source of the observation data.
        tests:
          - not_null
        config:
          meta:
            data_type: varchar
            is_primary_key: true
  - name: core__int_patient_casting
